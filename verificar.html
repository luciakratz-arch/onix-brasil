  <title>Verificação de Declaração — Coral Flamboyant</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Georgia',serif; background:#f5f5f5; color:#1a1a1a; min-height:100vh; }
    .container { max-width:680px; margin:0 auto; padding:20px; }
    .header { background:#B41020; color:#fff; padding:24px 32px; border-radius:8px 8px 0 0; }
    .header h1 { font-size:20px; font-weight:700; }
    .header p { font-size:10px; opacity:0.7; margin-top:4px; text-transform:uppercase; letter-spacing:2px; }
    .accent { background:#1B5E20; height:4px; }
    .body { background:#fff; padding:32px; border-radius:0 0 8px 8px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    .status-ok { background:#e8f5e9; border:2px solid #4caf50; border-radius:8px; padding:14px 18px; margin-bottom:24px; display:flex; align-items:center; gap:12px; }
    .status-err { background:#ffebee; border:2px solid #f44336; border-radius:8px; padding:14px 18px; margin-bottom:24px; }
    .field { margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid #f0f0f0; }
    .field label { font-size:10px; color:#999; text-transform:uppercase; letter-spacing:1px; font-family:Arial,sans-serif; display:block; }
    .field value { font-size:15px; font-weight:700; color:#1a1a1a; display:block; margin-top:3px; }
    .sigs { display:flex; justify-content:space-around; margin-top:28px; padding-top:20px; border-top:1px solid #eee; gap:20px; }
    .sig { text-align:center; flex:1; }
    .sig img { height:70px; object-fit:contain; display:block; margin:0 auto 6px; }
    .sig strong { font-size:12px; display:block; }
    .sig small { font-size:10px; color:#666; }
    .contact { background:#f9f9f9; border:1px solid #e0e0e0; border-radius:8px; padding:14px 18px; margin-top:20px; text-align:center; }
    .contact p { font-size:12px; color:#666; margin-bottom:4px; }
    .contact a { font-size:16px; font-weight:700; color:#B41020; text-decoration:none; }
    .loading { text-align:center; padding:60px 20px; color:#999; }
    .spinner { width:40px; height:40px; border:3px solid #e0e0e0; border-top-color:#B41020; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media print { body { background:#fff; } .container { padding:0; } }
  </style>

    function fmtDate(d) {
      if (!d) return "—";
      const [y,m,dd] = d.split("-");
      return `${parseInt(dd)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`;
    }

      apiKey: "AIzaSyDgLIpoGCO4Lb5oeiXNwArAQtGmquRSMhA",

    });
    const db = getDatabase(app);

    async function verify() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const el = document.getElementById("app");

      if (!id) {
        el.innerHTML = `<div class="status-err"><strong>❌ Link inválido.</strong><p style="margin-top:6px;font-size:13px;">ID não informado.</p></div>`;
        return;
      }

      try {
        const snap = await get(ref(db, `declaracoes/${id}`));
        if (!snap.exists()) {
          el.innerHTML = `
            <div class="header"><h1>Coral Flamboyant</h1><p>Verificação de Declaração</p></div>
            <div class="accent"></div>
            <div class="body">
              <div class="status-err">
                <strong>❌ Declaração não encontrada.</strong>
                <p style="margin-top:6px;font-size:13px;color:#666;">Código inválido ou documento não registrado.</p>
              </div>
              <div class="contact">
                <p>Para validação manual entre em contato:</p>
                <a href="tel:+5562991489893">📞 (62) 9 9148-9893</a>
                <p style="margin-top:4px;font-size:11px;color:#999;">Paulo Sergio Motta — Maestro</p>
              </div>
            </div>`;
          return;
        }

        const d = snap.val();
        const periodo = !d.endDate
          ? `${fmtDate(d.startDate)} até o momento`
          : `${fmtDate(d.startDate)} a ${fmtDate(d.endDate)}`;

        el.innerHTML = `
          <div class="header"><h1>Coral Flamboyant</h1><p>Declaração de Participação Verificada</p></div>
          <div class="accent"></div>
          <div class="body">
            <div class="status-ok">

                <small style="font-size:11px;color:#666;display:block;margin-top:2px;">Emitida em ${fmtDate(d.emitidaEm)} · Código: ${id}</small>
              </div>
            </div>
            <div class="field"><label>Nome</label><value>${d.nome}</value></div>
            <div class="field"><label>Função</label><value>${d.funcao}</value></div>
            <div class="field"><label>Grupo</label><value>Coral Flamboyant</value></div>
            <div class="field"><label>Período de Participação</label><value>${periodo}</value></div>
            ${d.apresentacoes && d.apresentacoes.length > 0 ? `
            <div class="field">

              <ul style="margin-top:8px;padding-left:20px;">
                ${d.apresentacoes.map(p => `<li style="font-size:13px;margin-bottom:3px;">${p}</li>`).join("")}

            </div>` : ""}

              <p style="margin-top:4px;font-size:11px;color:#999;">Paulo Sergio Motta — Maestro</p>
