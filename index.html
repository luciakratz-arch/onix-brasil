// Firebase sync utilities
let firebaseDB = null;
let firebaseInitialized = false;

async function initFirebase() {
  if (firebaseInitialized) return firebaseDB;
  try {
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
    const { getDatabase, ref, set, get, onValue } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js');
    
    const apps = getApps();
    const app = apps.length ? apps[0] : initializeApp(FIREBASE_CONFIG);
    firebaseDB = getDatabase(app);
    firebaseInitialized = true;
    window._fbDB = firebaseDB;
    window._fbRef = ref;
    window._fbSet = set;
    window._fbGet = get;
    window._fbOnValue = onValue;
    return firebaseDB;
  } catch(e) {
    console.error('Firebase init error:', e);
    return null;
  }
}

async function fbSave(key, data) {
  try {
    const db = await initFirebase();
    if (!db) return;
    const { ref, set } = { ref: window._fbRef, set: window._fbSet };
    await set(ref(db, DB_PATH + '/' + key), data);
  } catch(e) {
    console.error('Firebase save error:', e);
  }
}

async function fbLoad(key, fallback) {
  try {
    const db = await initFirebase();
    if (!db) return fallback;
    const { ref, get } = { ref: window._fbRef, get: window._fbGet };
    const snap = await get(ref(db, DB_PATH + '/' + key));
    if (snap.exists()) return snap.val();
    return fallback;
  } catch(e) {
    console.error('Firebase load error:', e);
    return fallback;
  }
}

function fbWatch(key, callback) {
  initFirebase().then(db => {
    if (!db) return;
    const { ref, onValue } = { ref: window._fbRef, onValue: window._fbOnValue };
    onValue(ref(db, DB_PATH + '/' + key), snap => {
      if (snap.exists()) callback(snap.val());
    });
  });
}

// Local storage fallback (used for initial load, Firebase syncs after)
function gs(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function ss(k, v) { 
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  fbSave(k, v); // also sync to Firebase
}

// Load from Firebase on startup (overrides localStorage)
async function loadFromFirebase(setters) {
  await initFirebase();
  for (const [key, setter, fallback] of setters) {
    const data = await fbLoad(key, null);
    if (data !== null) {
      setter(data);
      try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
    }
  }
}

function fmtDate(d) { if(!d) return ""; const [y,m,dd]=d.split("-"); return `${parseInt(dd)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`; }
function fmtShort(d) { if(!d) return ""; const [,m,dd]=d.split("-"); return `${parseInt(dd)}/${m}`; }
function fmtBday(d) { if(!d) return ""; const [,m,dd]=d.split("-"); return `${dd}/${m}`; }
function todayStr() { return new Date().toISOString().split("T")[0]; }
function getBdays(members) { const mo=new Date().getMonth()+1; return members.filter(m=>m.active&&m.birthday&&parseInt(m.birthday.split("-")[1])===mo); }
function fmtMoeda(v) { return "R$ " + parseFloat(v||0).toFixed(2).replace(".",","); }

function generatePDF(htmlContent, filename) {
  const full = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title>
  <style>* {margin:0;padding:0;box-sizing:border-box;} body{font-family:Arial,sans-serif;color:#1A1A1A;background:#fff;}
  @media print{.no-print{display:none!important;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
  </head><body>
  <div class="no-print" style="background:#4A0080;color:#fff;padding:14px 20px;text-align:center;font-family:Arial;font-size:14px;position:sticky;top:0;">
    📄 Para salvar como PDF: <strong>Ctrl+P → Salvar como PDF</strong>
    <button onclick="window.print()" style="margin-left:12px;background:#D4860A;color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-weight:700;">🖨️ Imprimir / PDF</button>
  </div>
  ${htmlContent}</body></html>`;
  const blob = new Blob([full],{type:"text/html;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const win = window.open(url,"_blank");
  if(!win){ const a=document.createElement("a"); a.href=url; a.download=filename+".html"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

// ── AGENDA ────────────────────────────────────────────────────
const EMPTY_FORM={title:"",type:"ensaio",date:"",timeChegada:"",timeApresentacao:"",location:"",vestuario:"",description:"",recurrence:"none",recurrenceDay:3,status:"normal",statusNote:""};

function AgendaTab({events,isAdmin,onSave,currentUser,members}) {
  const now=new Date();
  const [viewMonth,setViewMonth]=useState(now.getMonth());
  const [viewYear,setViewYear]=useState(now.getFullYear());
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(EMPTY_FORM);
  const [statusEditId,setStatusEditId]=useState(null);
  const [statusForm,setStatusForm]=useState({status:"normal",statusNote:""});
  const [deleteModal,setDeleteModal]=useState(null);
  const today=todayStr();

  function generateOcc(ev,vy,vm) {
    if(ev.recurrence==="none") return [ev];
    const result=[];
    const endDate=new Date(vy,vm+3,0);
    let cur=new Date(ev.date+"T12:00:00");
    let count=0;
    while(cur<=endDate&&count<200) {
      const dateStr=cur.toISOString().split("T")[0];
      if(!ev.exceptions||!ev.exceptions.includes(dateStr))
        result.push({...ev,date:dateStr,id:String(ev.id)+"_"+count,baseId:ev.id,confirmacoes:ev.confirmacoes||{}});
      if(ev.recurrence==="weekly") cur.setDate(cur.getDate()+7);
      else if(ev.recurrence==="biweekly") cur.setDate(cur.getDate()+14);
      else cur.setMonth(cur.getMonth()+1);
      count++;
    }
    return result;
  }

  const monthStr=String(viewYear)+"-"+String(viewMonth+1).padStart(2,"0");
  const allOcc=events.flatMap(ev=>generateOcc(ev,viewYear,viewMonth)).sort((a,b)=>a.date.localeCompare(b.date));
  const monthEvents=allOcc.filter(e=>e.date.startsWith(monthStr));
  const nextEvents=allOcc.filter(e=>e.date>=today).slice(0,3);
  const nextIds=new Set(nextEvents.map(e=>e.id));

  function toggleConfirmacao(ev) {
    const baseId=String(ev.baseId||ev.id);
    const uid=String(currentUser.id);
    const base=events.find(e=>String(e.id)===baseId);
    if(!base) return;
    const confs={...(base.confirmacoes||{})};
    if(confs[uid]) delete confs[uid];
    else confs[uid]={nome:currentUser.name,data:todayStr(),status:"confirmado"};
    onSave(events.map(e=>String(e.id)===baseId?{...e,confirmacoes:confs}:e));
  }

  function submit() {
    if(!form.title||!form.date) return;
    const data={...form,confirmacoes:{}};
    if(editId) onSave(events.map(e=>e.id===editId?{...e,...data}:e));
    else onSave([...events,{...data,id:Date.now()}]);
    setForm(EMPTY_FORM); setShowForm(false); setEditId(null);
  }

  function startEdit(ev) {
    const baseId=String(ev.baseId||ev.id);
    const base=events.find(e=>String(e.id)===baseId);
    if(!base) return;
    setForm({title:base.title,type:base.type||"ensaio",date:base.date,timeChegada:base.timeChegada||"",timeApresentacao:base.timeApresentacao||"",location:base.location||"",vestuario:base.vestuario||"",description:base.description||"",recurrence:base.recurrence||"none",recurrenceDay:base.recurrenceDay??3,status:base.status||"normal",statusNote:base.statusNote||""});
    setEditId(base.id); setShowForm(true);
  }

  function handleDelete(ev) {
    const isRec=ev.recurrence&&ev.recurrence!=="none";
    if(isRec) setDeleteModal(ev);
    else if(window.confirm("Remover este evento?")) onSave(events.filter(e=>String(e.id)!==String(ev.id)));
  }

  function confirmDelete(scope) {
    const ev=deleteModal;
    const baseId=String(ev.baseId||ev.id);
    if(scope==="all") onSave(events.filter(e=>String(e.id)!==baseId));
    else {
      const base=events.find(e=>String(e.id)===baseId);
      if(!base) return;
      const exceptions=[...(base.exceptions||[]),ev.date];
      onSave(events.map(e=>String(e.id)===baseId?{...e,exceptions}:e));
    }
    setDeleteModal(null);
  }

  function saveStatus(ev) {
    const baseId=String(ev.baseId||ev.id);
    onSave(events.map(e=>String(e.id)===baseId?{...e,...statusForm}:e));
    setStatusEditId(null);
  }

  function EventCard({ev,highlight}) {
    const st=EVENT_STATUS.find(s=>s.key===(ev.status||"normal"))||EVENT_STATUS[0];
    const cancelled=ev.status&&ev.status!=="normal";
    const evType=EVENT_TYPES.find(t=>t.key===(ev.type||"ensaio"))||EVENT_TYPES[0];
    const confirma=evType.confirma;
    const uid=String(currentUser?.id||0);
    const jaConfirmou=ev.confirmacoes&&ev.confirmacoes[uid];
    const totalConf=Object.keys(ev.confirmacoes||{}).length;

    return (
      <div style={{...CARD,borderLeft:`3px solid ${cancelled?st.color:highlight?C.laranja:C.roxo}`,background:highlight?"#FBF8FF":C.branco}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:14}}>{evType.icon}</span>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:cancelled?C.textoLeve:C.texto,textDecoration:cancelled?"line-through":"none"}}>{ev.title}</span>
              {ev.recurrence!=="none"&&<span style={{fontSize:9,color:C.roxo,fontWeight:700,textTransform:"uppercase",border:`1px solid ${C.roxo}`,borderRadius:3,padding:"1px 5px"}}>Recorrente</span>}
              {highlight&&<span style={{fontSize:9,color:C.laranja,fontWeight:700,textTransform:"uppercase",border:`1px solid ${C.laranja}`,borderRadius:3,padding:"1px 5px"}}>Próximo</span>}
            </div>
            <div style={{fontSize:12,color:cancelled?st.color:C.textoSub,marginTop:3,fontWeight:600}}>
              {fmtDate(ev.date)}{cancelled&&<span style={{marginLeft:6}}>— {st.label}</span>}
            </div>
            {!cancelled&&<>
              {ev.timeChegada&&<div style={{fontSize:11,color:C.textoSub,marginTop:2}}>🕐 Chegada: <strong>{ev.timeChegada}</strong></div>}
              {ev.timeApresentacao&&<div style={{fontSize:11,color:C.laranja,marginTop:1}}>🎶 Apresentação: <strong>{ev.timeApresentacao}</strong></div>}
              {ev.location&&<div style={{fontSize:11,color:C.textoLeve,marginTop:2}}>📍 {ev.location}</div>}
              {ev.vestuario&&<div style={{fontSize:11,color:C.textoLeve,marginTop:1}}>👔 {ev.vestuario}</div>}
              {ev.description&&<div style={{fontSize:11,color:C.textoLeve,marginTop:1,fontStyle:"italic"}}>{ev.description}</div>}
            </>}
            {/* Confirmação de presença */}
            {confirma&&!cancelled&&(
              <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {!isAdmin&&(
                  <button onClick={()=>toggleConfirmacao(ev)} style={{...BTN_SM(jaConfirmou?C.roxo:C.laranja),padding:"6px 14px",fontSize:12,fontWeight:700,background:jaConfirmou?C.roxo+"18":C.laranja+"18"}}>
                    {jaConfirmou?"✓ Participação confirmada":"Confirmar participação"}
                  </button>
                )}
                {(isAdmin||jaConfirmou)&&<span style={{fontSize:11,color:C.textoSub}}>{totalConf} confirmado{totalConf!==1?"s":""}</span>}
                {isAdmin&&totalConf>0&&(
                  <div style={{width:"100%",marginTop:4}}>
                    {Object.values(ev.confirmacoes||{}).map((c,i)=>(
                      <span key={i} style={{fontSize:10,background:C.roxo+"15",color:C.roxo,padding:"2px 6px",borderRadius:3,marginRight:4,marginBottom:2,display:"inline-block"}}>{c.nome.split(" ")[0]}</span>
                    ))}

            )}
          </div>

// ── RICH TEXT EDITOR ─────────────────────────────────────────
function RichTextEditor({ value, onChange, readonly, accentColor }) {
  const ref = React.useRef(null);
  const color = accentColor || "#4A0080";

  React.useEffect(() => {
    if (ref.current && ref.current.innerHTML !== value) {
      ref.current.innerHTML = value || "";
    }
  }, []);

  function exec(cmd, val) {
    ref.current.focus();
    document.execCommand(cmd, false, val);
    onChange(ref.current.innerHTML);
  }

  if (readonly) {
    return (
      <div style={{ fontSize:14, lineHeight:1.8, color:"#1A1A1A" }}
        dangerouslySetInnerHTML={{ __html: value || "<em style='color:#aaa'>Letra não cadastrada.</em>" }} />
    );
  }

  return (
    <div style={{ border:"1px solid #E8E0F0", borderRadius:8, overflow:"hidden" }}>
      <div style={{ background:"#f5f5f5", padding:"6px 8px", display:"flex", gap:4, flexWrap:"wrap", borderBottom:"1px solid #E8E0F0" }}>
        {[
          { cmd:"bold", label:"<b>N</b>", title:"Negrito" },
          { cmd:"italic", label:"<i>I</i>", title:"Itálico" },
          { cmd:"underline", label:"<u>S</u>", title:"Sublinhado" },
        ].map(t => (
          <button key={t.cmd} onMouseDown={e=>{ e.preventDefault(); exec(t.cmd); }}
            title={t.title}
            style={{ background:"#fff", border:"1px solid #ddd", borderRadius:4, padding:"3px 8px", cursor:"pointer", fontSize:13, minWidth:28 }}
            dangerouslySetInnerHTML={{ __html: t.label }} />
        ))}
        <select onMouseDown={e=>e.stopPropagation()} onChange={e=>exec("fontSize", e.target.value)} style={{ fontSize:11, border:"1px solid #ddd", borderRadius:4, padding:"2px 4px", background:"#fff" }}>
          <option value="">Tamanho</option>
          {[1,2,3,4,5].map(s=><option key={s} value={s}>{["Muito pequeno","Pequeno","Normal","Grande","Muito grande"][s-1]}</option>)}
        </select>
        {[
          { cmd:"justifyLeft", label:"⬅", title:"Esquerda" },
          { cmd:"justifyCenter", label:"≡", title:"Centralizar" },
          { cmd:"justifyRight", label:"➡", title:"Direita" },
        ].map(t => (
          <button key={t.cmd} onMouseDown={e=>{ e.preventDefault(); exec(t.cmd); }}
            title={t.title}
            style={{ background:"#fff", border:"1px solid #ddd", borderRadius:4, padding:"3px 8px", cursor:"pointer", fontSize:13 }}>
            {t.label}
          </button>
        ))}
        <input type="color" title="Cor do texto" onMouseDown={e=>e.stopPropagation()}
          onChange={e=>exec("foreColor", e.target.value)}
          style={{ width:28, height:26, border:"1px solid #ddd", borderRadius:4, cursor:"pointer", padding:1 }} />
      </div>
      <div ref={ref} contentEditable suppressContentEditableWarning
        onInput={()=>onChange(ref.current.innerHTML)}
        style={{ minHeight:120, padding:"12px 14px", fontSize:14, lineHeight:1.8, outline:"none", color:"#1A1A1A" }} />
    </div>
  );
}

function FilePlayer({ url, label, icon, type }) {
  if (!url || !url.trim()) return null;
  if (type === "doc") return (
    <a href={url} target="_blank" rel="noreferrer" style={{ display:"flex", alignItems:"center", gap:8, background:"#f9f9f9", border:"1px solid #E8E0E0", borderRadius:6, padding:"10px 12px", color:"#666", textDecoration:"none", fontSize:12, fontWeight:700, marginBottom:8 }}>
      <span style={{ fontSize:16 }}>{icon}</span>
      <span>{label}</span>
      <span style={{ marginLeft:"auto", fontSize:10, color:"#999", background:"#fff", border:"1px solid #E8E0E0", borderRadius:4, padding:"2px 6px" }}>Abrir ↗</span>
    </a>
  );
  let src = url;
  const dm = url && url.match(/\/d\/([^/]+)/);
  if (dm) src = "https://drive.google.com/uc?export=download&id=" + dm[1];
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4, color:"#666" }}>{icon} {label}</div>
      <audio controls style={{ width:"100%", height:34 }} src={src} />
    </div>
  );
}

function KitsTab({ songs, isAdmin, onSave, songCats, onSaveCats, accentColor }) {
  const RED = accentColor || "#B41020";
  const cats = songCats || [];
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", composer:"", category:cats[0]||"" });
  const [filterCat, setFilterCat] = useState("todos");
  const [filterLetter, setFilterLetter] = useState("todos");
  const [showCatMgr, setShowCatMgr] = useState(false);
  const [newCat, setNewCat] = useState("");

  function addSong() {
    if (!form.title) return;
    const files = {}; FILE_FIELDS.forEach(f=>files[f.key]="");
    onSave([...songs,{id:Date.now(),...form,curiosidades:"",letra:"",files}]);
    setForm({title:"",composer:"",category:cats[0]||""}); setShowForm(false);
  }

  const allLetters = [...new Set(songs.map(s=>s.title[0]?.toUpperCase()).filter(Boolean))].sort();
  let filtered = [...songs];
  if (filterCat!=="todos") filtered=filtered.filter(s=>s.category===filterCat);
  if (filterLetter!=="todos") filtered=filtered.filter(s=>s.title[0]?.toUpperCase()===filterLetter);
  filtered.sort((a,b)=>a.title.localeCompare(b.title,"pt-BR"));

  const grouped = filterCat==="todos"
    ? cats.reduce((acc,cat)=>{ const s=filtered.filter(x=>x.category===cat); if(s.length) acc[cat]=s; return acc; },{})
    : {[filterCat]:filtered};
  const uncat = filtered.filter(s=>!cats.includes(s.category));
  if(uncat.length) grouped["Sem categoria"]=uncat;

  return (
    <div>
      {isAdmin && (
        <div style={{ display:"flex", gap:8, marginBottom:18 }}>
          <button onClick={()=>setShowForm(!showForm)} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", flex:1, fontFamily:"inherit" }}>{showForm?"Cancelar":"+ Nova Música"}</button>
          <button onClick={()=>setShowCatMgr(!showCatMgr)} title="Gerenciar categorias" style={{ background:"#666", color:"#fff", border:"none", borderRadius:6, padding:"11px 14px", cursor:"pointer", fontFamily:"inherit", fontSize:13 }}>⚙️</button>
        </div>
      )}

      {showCatMgr && isAdmin && (
        <div style={{ background:"#f9f9f9", border:"1px solid #E8E0E0", borderRadius:8, padding:16, marginBottom:16 }}>
          <div style={{ fontSize:11, fontWeight:700, color:"#666", textTransform:"uppercase", letterSpacing:1, marginBottom:10 }}>Gerenciar Categorias</div>
          {cats.map(cat=>(
            <div key={cat} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"7px 0", borderBottom:"1px solid #E8E0E0" }}>
              <span style={{ fontSize:13, fontWeight:600 }}>{cat}</span>
              <button onClick={()=>{ if(songs.some(s=>s.category===cat)){alert("Remova as músicas desta categoria primeiro!");return;} onSaveCats(cats.filter(c=>c!==cat)); }} style={{ background:"transparent", color:RED, border:"1px solid "+RED, borderRadius:4, padding:"3px 8px", fontSize:11, cursor:"pointer" }}>✕</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(onSaveCats([...cats,newCat.trim()]),setNewCat(""))} placeholder="Nova categoria..." style={{ flex:1, padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none" }}/>
            <button onClick={()=>{ if(!newCat.trim()||cats.includes(newCat.trim()))return; onSaveCats([...cats,newCat.trim()]); setNewCat(""); }} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"10px 16px", cursor:"pointer", fontSize:13, fontWeight:700 }}>+</button>
          </div>
        </div>
      )}

      {showForm && (
        <div style={{ background:"#f9f9f9", border:"1px solid #E8E0E0", borderRadius:8, padding:16, marginBottom:16 }}>
          <div style={{ marginBottom:10 }}><label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Título *</label><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box" }}/></div>
          <div style={{ marginBottom:10 }}><label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Compositor</label><input value={form.composer} onChange={e=>setForm({...form,composer:e.target.value})} style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box" }}/></div>
          <div style={{ marginBottom:12 }}><label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Categoria</label>
            <select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box", background:"#fff" }}>
              {cats.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <button onClick={addSong} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", fontFamily:"inherit" }}>Adicionar Música</button>
        </div>
      )}

      <div style={{ display:"flex", gap:6, overflowX:"auto", paddingBottom:6, marginBottom:8 }}>
        {["todos",...cats].map(c=>(
          <button key={c} onClick={()=>setFilterCat(c)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:4, border:"1px solid "+(filterCat===c?RED:"#E8E0E0"), cursor:"pointer", fontSize:11, fontWeight:700, background:filterCat===c?RED:"#fff", color:filterCat===c?"#fff":"#666", fontFamily:"inherit" }}>
            {c==="todos"?"Todas":c}
          </button>
        ))}
      </div>

      {allLetters.length > 5 && (
        <div style={{ display:"flex", gap:4, flexWrap:"wrap", marginBottom:12 }}>
          <button onClick={()=>setFilterLetter("todos")} style={{ padding:"3px 8px", borderRadius:4, border:"1px solid "+(filterLetter==="todos"?RED:"#E8E0E0"), cursor:"pointer", fontSize:11, fontWeight:700, background:filterLetter==="todos"?RED:"#fff", color:filterLetter==="todos"?"#fff":"#666", fontFamily:"inherit" }}>Todas</button>
          {allLetters.map(l=>(
            <button key={l} onClick={()=>setFilterLetter(l)} style={{ padding:"3px 8px", borderRadius:4, border:"1px solid "+(filterLetter===l?RED:"#E8E0E0"), cursor:"pointer", fontSize:11, fontWeight:700, background:filterLetter===l?RED:"#fff", color:filterLetter===l?"#fff":"#666", fontFamily:"inherit" }}>{l}</button>
          ))}
        </div>
      )}

      {songs.length===0 && <div style={{ textAlign:"center", color:"#ccc", fontSize:13, padding:"32px 0", fontStyle:"italic" }}>Nenhuma música no repertório ainda.</div>}

      {Object.entries(grouped).map(([cat,catSongs])=>(
        <div key={cat}>
          <div style={{ fontSize:11, fontWeight:700, color:RED, textTransform:"uppercase", letterSpacing:1.5, margin:"16px 0 8px", paddingBottom:6, borderBottom:"2px solid "+RED }}>
            {cat} <span style={{ color:"#999", fontWeight:400 }}>({catSongs.length})</span>
          </div>
          {catSongs.map(s=><SongCard key={s.id} song={s} isAdmin={isAdmin} songCats={cats} accentColor={RED}
            onUpdate={u=>onSave(songs.map(x=>x.id===s.id?u:x))}
            onDelete={id=>onSave(songs.filter(x=>x.id!==id))}/>)}
        </div>
      ))}
    </div>
  );
}

function EstudosTab({materials,isAdmin,onSave}) {

  const filtered=filterCat==="todos"?materials:materials.filter(m=>m.category===filterCat);

      {showForm&&<div style={FORM}><Inp label="Título *" value={form.title} onChange={v=>setForm({...form,title:v})}/><Inp label="Link *" value={form.url} onChange={v=>setForm({...form,url:v})} placeholder="https://youtube.com/..."/><div style={{marginBottom:12}}><label style={LS}>Categoria</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={IS}>{STUDY_CATEGORIES.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select></div><Inp label="Descrição" value={form.description} onChange={v=>setForm({...form,description:v})}/><button onClick={submit} style={BTN_P}>{editId?"Salvar":"Adicionar"}</button></div>}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:16}}>

            {isAdmin&&<div style={{display:"flex",gap:4,marginLeft:8}}><button onClick={()=>{setForm({title:mat.title,url:mat.url,category:mat.category,description:mat.description||""});setEditId(mat.id);setShowForm(true);}} style={BTN_SM("#1565C0")}>✏</button><button onClick={()=>{if(window.confirm("Remover?"))onSave(materials.filter(x=>x.id!==mat.id));}} style={BTN_SM("#B41020")}>✕</button></div>}

}

// ── FINANCEIRO ────────────────────────────────────────────────
function FinanceiroTab({financeiro,onSave,members}) {
  const [section,setSection]=useState("resumo");
  const [form,setForm]=useState({tipo:"receita",descricao:"",valor:"",data:todayStr(),categoria:""});
  const [showForm,setShowForm]=useState(false);
  const [taxaEdit,setTaxaEdit]=useState(false);
  const [novaTaxa,setNovaTaxa]=useState(String(financeiro.taxa));
  const [mesTaxa,setMesTaxa]=useState(todayStr().slice(0,7));

  const receitas=financeiro.receitas||[];
  const despesas=financeiro.despesas||[];
  const totalReceitas=receitas.reduce((s,r)=>s+parseFloat(r.valor||0),0);
  const totalDespesas=despesas.reduce((s,d)=>s+parseFloat(d.valor||0),0);
  const saldo=totalReceitas-totalDespesas;

  // Taxa mensal
  const membrosAtivos=members.filter(m=>m.active);
  const taxasPagas=financeiro.taxasPagas||{};
  const mesTaxaKey=mesTaxa;
  const pagosNoMes=taxasPagas[mesTaxaKey]||{};

  function toggleTaxa(memberId) {
    const key=String(memberId);
    const novoMes={...pagosNoMes};
    if(novoMes[key]) delete novoMes[key];
    else novoMes[key]={data:todayStr()};
    onSave({...financeiro,taxasPagas:{...taxasPagas,[mesTaxaKey]:novoMes}});
  }

  const [membrosVinculados, setMembrosVinculados] = useState([]);
  const [valorMembro, setValorMembro] = useState("");

  function addLancamento(){
    if(!form.descricao||!form.valor) return;
    const item = {...form, id:Date.now(), membrosVinculados, valorMembro: parseFloat(valorMembro)||0};
    if(form.tipo==="receita") onSave({...financeiro,receitas:[...receitas,item]});
    else onSave({...financeiro,despesas:[...despesas,item]});
    setForm({tipo:"receita",descricao:"",valor:"",data:todayStr(),categoria:""});
    setMembrosVinculados([]); setValorMembro(""); setShowForm(false);
  }

  const sections=["resumo","lancamentos","taxa"];

  return (
    <div>
      <div style={{display:"flex",gap:0,marginBottom:20,border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden"}}>
        {sections.map(s=><button key={s} onClick={()=>setSection(s)} style={{flex:1,padding:"10px",border:"none",cursor:"pointer",fontFamily:"inherit",background:section===s?C.roxo:C.branco,color:section===s?"#fff":C.textoSub,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>
          {s==="resumo"?"Resumo":s==="lancamentos"?"Lançamentos":"Taxa Mensal"}
        </button>)}
      </div>

      {section==="resumo"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            <div style={{...CARD,textAlign:"center",borderTop:`3px solid #1B5E20`}}><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Receitas</div><div style={{fontSize:24,fontWeight:700,color:"#1B5E20",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(totalReceitas)}</div></div>
            <div style={{...CARD,textAlign:"center",borderTop:"3px solid #B41020"}}><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Despesas</div><div style={{fontSize:24,fontWeight:700,color:"#B41020",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(totalDespesas)}</div></div>
          </div>
          <div style={{...CARD,textAlign:"center",borderTop:`3px solid ${saldo>=0?C.roxo:C.laranja}`}}>
            <div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Saldo</div>
            <div style={{fontSize:32,fontWeight:700,color:saldo>=0?C.roxo:"#B41020",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(saldo)}</div>
          </div>
          {/* Últimos lançamentos */}
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,margin:"16px 0 8px"}}>Últimos lançamentos</div>
          {[...receitas.map(r=>({...r,tipo:"receita"})),...despesas.map(d=>({...d,tipo:"despesa"}))].sort((a,b)=>b.data?.localeCompare(a.data||"")||0).slice(0,5).map(l=>(
            <div key={l.id} style={{...CARD,padding:"10px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600,color:C.texto}}>{l.descricao}</div><div style={{fontSize:10,color:C.textoLeve,marginTop:2}}>{fmtDate(l.data)}{l.categoria?` · ${l.categoria}`:""}</div></div>
                <div style={{fontSize:14,fontWeight:700,color:l.tipo==="receita"?"#1B5E20":"#B41020"}}>{l.tipo==="receita"?"+":"-"}{fmtMoeda(l.valor)}</div>
              </div>
            </div>
          ))}
          {receitas.length===0&&despesas.length===0&&<div style={EMPTY}>Nenhum lançamento ainda.</div>}
        </div>
      )}

      {section==="lancamentos"&&(
        <div>
          <button onClick={()=>setShowForm(!showForm)} style={{...BTN_P,marginBottom:18}}>{showForm?"Cancelar":"+ Novo Lançamento"}</button>
          {showForm&&(
            <div style={FORM}>
              <div style={{display:"flex",gap:0,marginBottom:12,border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden"}}>
                {["receita","despesa"].map(t=><button key={t} onClick={()=>setForm({...form,tipo:t})} style={{flex:1,padding:"9px",border:"none",cursor:"pointer",fontFamily:"inherit",background:form.tipo===t?(t==="receita"?"#1B5E20":"#B41020"):C.branco,color:form.tipo===t?"#fff":C.textoSub,fontWeight:700,fontSize:12}}>{t==="receita"?"+ Receita":"− Despesa"}</button>)}
              </div>
              <Inp label="Descrição *" value={form.descricao} onChange={v=>setForm({...form,descricao:v})} placeholder="Ex: Campanha de rifa, Viagem..."/>
              <Inp label="Valor (R$) *" type="number" value={form.valor} onChange={v=>setForm({...form,valor:v})} placeholder="0,00"/>
              <Inp label="Data" type="date" value={form.data} onChange={v=>setForm({...form,data:v})}/>
              <Inp label="Categoria" value={form.categoria} onChange={v=>setForm({...form,categoria:v})} placeholder="Ex: Viagem, Figurino, Rifa..."/>
              {form.tipo==="receita"&&(
                <div style={{marginBottom:12}}>
                  <label style={LS}>Vincular coristas (repasse individual)</label>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                    {members.filter(m=>m.active).map(m=>(
                      <button key={m.id} onClick={()=>setMembrosVinculados(prev=>prev.includes(String(m.id))?prev.filter(x=>x!==String(m.id)):[...prev,String(m.id)])}
                        style={{padding:"4px 10px",borderRadius:4,border:`1px solid ${membrosVinculados.includes(String(m.id))?C.roxo:C.borda}`,cursor:"pointer",fontSize:11,fontWeight:600,background:membrosVinculados.includes(String(m.id))?C.roxo+"18":"#fff",color:membrosVinculados.includes(String(m.id))?C.roxo:C.textoSub,fontFamily:"inherit"}}>
                        {m.name.split(" ")[0]}
                      </button>
                    ))}
                  </div>
                  {membrosVinculados.length>0&&<Inp label="Valor por corista (R$)" type="number" value={valorMembro} onChange={setValorMembro} placeholder="0,00"/>}
                </div>
              )}
              <button onClick={addLancamento} style={BTN_P}>Adicionar</button>
            </div>
          )}
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Receitas</div>
          {receitas.length===0&&<div style={EMPTY}>Nenhuma receita ainda.</div>}
          {receitas.map(r=>(
            <div key={r.id} style={{...CARD,padding:"10px 14px",borderLeft:"3px solid #1B5E20"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600,color:C.texto}}>{r.descricao}</div><div style={{fontSize:10,color:C.textoLeve,marginTop:2}}>{fmtDate(r.data)}{r.categoria?` · ${r.categoria}`:""}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:700,color:"#1B5E20"}}>+{fmtMoeda(r.valor)}</span><button onClick={()=>{if(window.confirm("Remover?"))onSave({...financeiro,receitas:receitas.filter(x=>x.id!==r.id)});}} style={BTN_SM("#B41020")}>✕</button></div>
              </div>
            </div>
          ))}
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,margin:"16px 0 8px"}}>Despesas</div>
          {despesas.length===0&&<div style={EMPTY}>Nenhuma despesa ainda.</div>}
          {despesas.map(d=>(
            <div key={d.id} style={{...CARD,padding:"10px 14px",borderLeft:"3px solid #B41020"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600,color:C.texto}}>{d.descricao}</div><div style={{fontSize:10,color:C.textoLeve,marginTop:2}}>{fmtDate(d.data)}{d.categoria?` · ${d.categoria}`:""}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:700,color:"#B41020"}}>-{fmtMoeda(d.valor)}</span><button onClick={()=>{if(window.confirm("Remover?"))onSave({...financeiro,despesas:despesas.filter(x=>x.id!==d.id)});}} style={BTN_SM("#B41020")}>✕</button></div>
              </div>
            </div>
          ))}
        </div>
      )}

      {section==="taxa"&&(
        <div>
          <div style={{...CARD,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8}}>Taxa Mensal</div><div style={{fontSize:22,fontWeight:700,color:C.roxo,fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(financeiro.taxa)}</div></div>
              <button onClick={()=>setTaxaEdit(!taxaEdit)} style={BTN_SM(C.laranja)}>✏ Editar</button>
            </div>
            {taxaEdit&&<div style={{marginTop:12,display:"flex",gap:8}}><input type="number" value={novaTaxa} onChange={e=>setNovaTaxa(e.target.value)} style={{...IS,flex:1}}/><button onClick={()=>{onSave({...financeiro,taxa:parseFloat(novaTaxa)||0});setTaxaEdit(false);}} style={{...BTN_P,width:"auto",padding:"10px 18px"}}>Salvar</button></div>}
          </div>
          <div style={{marginBottom:14}}>
            <label style={LS}>Mês de referência</label>
            <input type="month" value={mesTaxa} onChange={e=>setMesTaxa(e.target.value)} style={IS}/>
          </div>
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>
            Pagamentos — {Object.keys(pagosNoMes).length}/{membrosAtivos.length} pagos
          </div>
          {membrosAtivos.map(m=>{
            const pago=pagosNoMes[String(m.id)];
            return(
              <div key={m.id} style={{...CARD,padding:"10px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.texto}}>{m.name}</div>
                    <div style={{fontSize:10,color:pago?"#1B5E20":C.textoLeve,marginTop:2}}>{pago?`✓ Pago em ${fmtDate(pago.data)}`:"Pendente"}</div>
                  </div>
                  <button onClick={()=>toggleTaxa(m.id)} style={{...BTN_SM(pago?"#1B5E20":C.laranja),padding:"6px 12px"}}>{pago?"✓ Pago":"Marcar pago"}</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── DECLARAÇÃO ────────────────────────────────────────────────
function DeclaracaoTab({member,isAdmin,members,events,pauloSig,luciaSig}) {
  const today=todayStr();
  const [selectedMemberId,setSelectedMemberId]=useState(isAdmin?-1:member.id);
  const [funcao,setFuncao]=useState(isAdmin?"produtora":"corista");
  
  const selectedMember = isAdmin 
    ? (selectedMemberId===-1 ? {id:-1,name:"Lucia Kratz",voice:"soprano",startDate:"2026-01-01",endDate:""} 
       : selectedMemberId===-2 ? {id:-2,name:"Paulo Sergio Motta",voice:"tenor",startDate:"2026-01-01",endDate:""}
       : members.find(m=>m.id===selectedMemberId)||member)
    : member;
  
  const startDate=selectedMember.startDate||today;
  const endDate=selectedMember.endDate||today;

            <label style={LS}>Pessoa</label>

// ── CADASTRO ─────────────────────────────────────────────────
function CadastroTab({members,onSave,notices,onSaveNotices}) {
  const [section,setSection]=useState("members");
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState({name:"",voice:"soprano",birthday:"",whatsapp:"",active:true,startDate:todayStr(),endDate:""});
  const [noticeText,setNoticeText]=useState("");
  const active=members.filter(m=>m.active);
  const inactive=members.filter(m=>!m.active);

  function submit(){if(!form.name)return;if(editId)onSave(members.map(m=>m.id===editId?{...m,...form}:m));else onSave([...members,{...form,id:Date.now()}]);setForm({name:"",voice:"soprano",birthday:"",whatsapp:"",active:true,startDate:todayStr(),endDate:""});setShowForm(false);setEditId(null);}

  return (
    <div>
      <div style={{display:"flex",gap:0,marginBottom:20,border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden"}}>
        {["members","notices"].map(s=><button key={s} onClick={()=>setSection(s)} style={{flex:1,padding:"10px",border:"none",cursor:"pointer",fontFamily:"inherit",background:section===s?C.roxo:C.branco,color:section===s?"#fff":C.textoSub,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>
          {s==="members"?`Coristas (${active.length})` :"Avisos"}
        </button>)}
      </div>
      {section==="members"&&(
        <>
          <button onClick={()=>{setShowForm(!showForm);setEditId(null);setForm({name:"",voice:"soprano",birthday:"",whatsapp:"",active:true,startDate:todayStr(),endDate:""});}} style={{...BTN_P,marginBottom:16}}>{showForm?"Cancelar":"+ Novo Corista"}</button>
          {showForm&&<div style={FORM}><Inp label="Nome *" value={form.name} onChange={v=>setForm({...form,name:v})}/><div style={{marginBottom:12}}><label style={LS}>Voz</label><select value={form.voice} onChange={e=>setForm({...form,voice:e.target.value})} style={IS}>{Object.entries(VOICE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div><Inp label="Aniversário" type="date" value={form.birthday} onChange={v=>setForm({...form,birthday:v})}/><Inp label="WhatsApp" value={form.whatsapp} onChange={v=>setForm({...form,whatsapp:v})} placeholder="62999990000"/><Inp label="Data de início" type="date" value={form.startDate} onChange={v=>setForm({...form,startDate:v})}/><button onClick={submit} style={BTN_P}>{editId?"Salvar":"Cadastrar"}</button></div>}
          <div style={{fontSize:10,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1.5,marginBottom:10}}>Ativos ({active.length})</div>
          {active.map(m=>(
            <div key={m.id} style={CARD}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.texto}}>{m.name}</div>
                  <div style={{display:"flex",gap:6,marginTop:5,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:10,color:VOICE_COLORS[m.voice],fontWeight:700,textTransform:"uppercase",border:`1px solid ${VOICE_COLORS[m.voice]}`,borderRadius:3,padding:"1px 6px"}}>{VOICE_LABELS[m.voice]}</span>
                    {m.birthday&&<span style={{fontSize:11,color:C.textoLeve}}>🎂 {fmtBday(m.birthday)}</span>}
                    {m.whatsapp&&<span style={{fontSize:11,color:C.textoLeve}}>📱 {m.whatsapp}</span>}
                  </div>
                  <div style={{fontSize:10,color:C.textoLeve,marginTop:4}}>Desde: {fmtDate(m.startDate||"")}</div>
                </div>
                <div style={{display:"flex",gap:4,flexDirection:"column",alignItems:"flex-end"}}>
                  <button onClick={()=>{setForm({name:m.name,voice:m.voice,birthday:m.birthday||"",whatsapp:m.whatsapp||"",active:m.active,startDate:m.startDate||"",endDate:m.endDate||""});setEditId(m.id);setShowForm(true);}} style={BTN_SM("#1565C0")}>✏</button>
                  <button onClick={()=>onSave(members.map(x=>x.id===m.id?{...x,active:false,endDate:todayStr()}:x))} style={BTN_SM(C.laranja)}>Desativar</button>
                </div>
              </div>
            </div>
          ))}
          {inactive.length>0&&<><div style={{fontSize:10,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1.5,margin:"16px 0 10px"}}>Histórico — Inativos ({inactive.length})</div>{inactive.map(m=><div key={m.id} style={{...CARD,opacity:0.65}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600,fontSize:13,color:C.textoSub}}>{m.name}</div><div style={{fontSize:10,color:C.textoLeve}}>{VOICE_LABELS[m.voice]} · Saída: {fmtDate(m.endDate)}</div></div><button onClick={()=>onSave(members.map(x=>x.id===m.id?{...x,active:true,endDate:""}:x))} style={BTN_SM(C.roxo)}>Reativar</button></div></div>)}</>}
        </>
      )}
      {section==="notices"&&(
        <><div style={FORM}><label style={LS}>Novo Aviso</label><textarea value={noticeText} onChange={e=>setNoticeText(e.target.value)} placeholder="Digite o aviso..." style={{...IS,height:80,resize:"vertical"}}/><button onClick={()=>{if(!noticeText.trim())return;onSaveNotices([...notices,{id:Date.now(),text:noticeText,date:todayStr(),author:"Administração"}]);setNoticeText("");}} style={{...BTN_P,marginTop:10}}>Publicar</button></div>
        {[...notices].reverse().map(n=><div key={n.id} style={CARD}><div style={{fontSize:10,color:C.roxo,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:5}}>{n.author} · {fmtShort(n.date)}</div><div style={{fontSize:13,color:C.texto,lineHeight:1.5}}>{n.text}</div><button onClick={()=>{if(window.confirm("Remover?"))onSaveNotices(notices.filter(x=>x.id!==n.id));}} style={{...BTN_SM("#B41020"),marginTop:10}}>Remover</button></div>)}</>
      )}
    </div>
  );
}

function RelatorioTab({members,events,songs,materials,financeiro,pauloSig,luciaSig}) {
  const today = todayStr();
  const now = new Date();
  const [mesInicio,setMesInicio] = useState(String(now.getFullYear())+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const [mesFim,setMesFim] = useState(String(now.getFullYear())+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const [textoIntro,setTextoIntro] = useState("");
  const [linkVideo,setLinkVideo] = useState("");
  const [linkFotos,setLinkFotos] = useState("");

  const active = members.filter(m=>m.active);
  const inactive = members.filter(m=>!m.active);
  const byVoice = Object.keys(VOICE_LABELS).map(v=>({voice:v,count:active.filter(m=>m.voice===v).length}));
  const maxVoice = Math.max(...byVoice.map(v=>v.count),1);
  const bdays = getBdays(members);

  function getEventsInPeriod() {
    const start = mesInicio+"-01";
    const endDate = new Date(mesFim.split("-")[0],parseInt(mesFim.split("-")[1]),0);
    const end = endDate.toISOString().split("T")[0];
    return events.filter(e=>e.date>=start&&e.date<=end&&(e.status||"normal")==="normal");
  }

  const eventosRealizados = getEventsInPeriod();
  const ensaios = eventosRealizados.filter(e=>e.type==="ensaio"||e.recurrence!=="none");
  const apresentacoes = eventosRealizados.filter(e=>e.type!=="ensaio"&&e.recurrence==="none");
  const viagens = eventosRealizados.filter(e=>e.type==="viagem");

  const receitas = (financeiro.receitas||[]);
  const despesas = (financeiro.despesas||[]);
  const totalReceitas = receitas.reduce((s,r)=>s+parseFloat(r.valor||0),0);
  const totalDespesas = despesas.reduce((s,d)=>s+parseFloat(d.valor||0),0);

  function periodoLabel() {
    if(mesInicio===mesFim){const[y,m]=mesInicio.split("-");return `${MONTHS_PT[parseInt(m)-1]} de ${y}`;}
    const[y1,m1]=mesInicio.split("-");const[y2,m2]=mesFim.split("-");

// ── MEU FINANCEIRO (CORISTA) ──────────────────────────────────
function MeuFinanceiroTab({ member, financeiro }) {
  const taxasPagas = financeiro.taxasPagas || {};
  const taxa = financeiro.taxa || 15;
  const uid = String(member.id);

  // Get all months this member has records
  const mesesComRegistro = Object.keys(taxasPagas).sort().reverse();

  // Get all campaigns linked to this member
  const campanhas = (financeiro.receitas || []).filter(r =>
    r.membrosVinculados && r.membrosVinculados.includes(uid)
  );

  const totalPago = mesesComRegistro.filter(m => taxasPagas[m][uid]).length * taxa;
  const totalCampanhas = campanhas.reduce((s, c) => s + parseFloat(c.valorMembro || 0), 0);

  // Gerar últimos 6 meses para o gráfico
  const now = new Date();
  const ultimos6 = Array.from({length:6}, (_,i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - (5-i), 1);
    return String(d.getFullYear()) + "-" + String(d.getMonth()+1).padStart(2,"0");
  });

  return (
    <div>
      <div style={{ background:C.roxo, borderRadius:8, padding:"16px 18px", marginBottom:20, color:"#fff" }}>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700 }}>{member.name}</div>
        <div style={{ fontSize:11, marginTop:3, opacity:0.85, textTransform:"uppercase", letterSpacing:0.8 }}>Meu Financeiro</div>
      </div>

      {/* Cards resumo */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ ...CARD, textAlign:"center", borderTop:`3px solid ${C.roxo}` }}>
          <div style={{ fontSize:10, color:C.textoSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4 }}>Mensalidades Pagas</div>
          <div style={{ fontSize:22, fontWeight:700, color:C.roxo, fontFamily:"'Playfair Display',serif" }}>{fmtMoeda(totalPago)}</div>
        </div>
        <div style={{ ...CARD, textAlign:"center", borderTop:`3px solid ${C.laranja}` }}>
          <div style={{ fontSize:10, color:C.textoSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4 }}>Campanhas / Rifas</div>
          <div style={{ fontSize:22, fontWeight:700, color:C.laranja, fontFamily:"'Playfair Display',serif" }}>{fmtMoeda(totalCampanhas)}</div>
        </div>
      </div>

      {/* Gráfico de pagamentos mensais */}
      <div style={{ ...CARD, marginBottom:16 }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.textoSub, textTransform:"uppercase", letterSpacing:1, marginBottom:16 }}>Pagamentos — Últimos 6 meses</div>
        <div style={{ display:"flex", alignItems:"flex-end", justifyContent:"space-between", gap:6, height:80 }}>
          {ultimos6.map(mes => {
            const pago = taxasPagas[mes] && taxasPagas[mes][uid];
            const [ano, m] = mes.split("-");
            const mesAbrev = MONTHS_PT[parseInt(m)-1].slice(0,3);
            const temRegistro = taxasPagas[mes] !== undefined;
            return (
              <div key={mes} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                <div style={{ fontSize:9, color:pago?"#1B5E20":temRegistro?"#B41020":C.textoLeve, fontWeight:700 }}>
                  {pago ? "✓" : temRegistro ? "✕" : "—"}
                </div>
                <div style={{
                  width:"100%", borderRadius:"4px 4px 0 0",
                  height: pago ? 52 : temRegistro ? 52 : 20,
                  background: pago ? C.roxo : temRegistro ? "#ffcdd2" : "#f0f0f0",
                  transition:"height 0.4s",
                  border: pago ? "none" : temRegistro ? "1px solid #ef9a9a" : "1px solid #e0e0e0",
                  position:"relative",
                }}>
                  {pago && (
                    <div style={{ position:"absolute", bottom:4, left:0, right:0, textAlign:"center", fontSize:8, color:"#fff", fontWeight:700 }}>
                      {fmtMoeda(taxa).replace("R$ ","")}
                    </div>
                  )}
                </div>
                <div style={{ fontSize:9, color:C.textoSub, fontWeight:600, textTransform:"capitalize" }}>{mesAbrev}</div>
                <div style={{ fontSize:8, color:C.textoLeve }}>{ano.slice(2)}</div>
              </div>
            );
          })}
        </div>
        <div style={{ display:"flex", gap:12, marginTop:12, justifyContent:"center" }}>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}><div style={{ width:10, height:10, borderRadius:2, background:C.roxo }}/><span style={{ fontSize:10, color:C.textoSub }}>Pago</span></div>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}><div style={{ width:10, height:10, borderRadius:2, background:"#ffcdd2", border:"1px solid #ef9a9a" }}/><span style={{ fontSize:10, color:C.textoSub }}>Pendente</span></div>
          <div style={{ display:"flex", alignItems:"center", gap:4 }}><div style={{ width:10, height:10, borderRadius:2, background:"#f0f0f0", border:"1px solid #e0e0e0" }}/><span style={{ fontSize:10, color:C.textoSub }}>Sem registro</span></div>
        </div>
      </div>

      {/* Lista de mensalidades */}
      <div style={{ ...CARD, marginBottom:12 }}>
        <div style={{ fontSize:11, fontWeight:700, color:C.textoSub, textTransform:"uppercase", letterSpacing:1, marginBottom:14 }}>Histórico de Mensalidades</div>
        {mesesComRegistro.length === 0 && <div style={EMPTY}>Nenhum registro ainda.</div>}
        {mesesComRegistro.map(mes => {
          const pago = taxasPagas[mes][uid];
          const [ano, m] = mes.split("-");
          const mesLabel = `${MONTHS_PT[parseInt(m)-1]} de ${ano}`;
          return (
            <div key={mes} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:`1px solid ${C.borda}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <div style={{ width:36, height:36, borderRadius:8, background:pago?C.roxo:"#ffcdd2", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <span style={{ fontSize:16 }}>{pago?"✓":"✕"}</span>
                </div>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:C.texto, textTransform:"capitalize" }}>{mesLabel}</div>
                  <div style={{ fontSize:10, color:pago?"#1B5E20":"#B41020", marginTop:1 }}>
                    {pago ? `Pago em ${fmtDate(pago.data)}` : "Pendente"}
                  </div>
                </div>
              </div>
              <div style={{ fontSize:14, fontWeight:700, color:pago?"#1B5E20":"#B41020" }}>
                {pago ? fmtMoeda(taxa) : "—"}
              </div>
            </div>
          );
        })}
      </div>

      {/* Campanhas */}
      <div style={CARD}>
        <div style={{ fontSize:11, fontWeight:700, color:C.textoSub, textTransform:"uppercase", letterSpacing:1, marginBottom:14 }}>Campanhas & Rifas</div>
        {campanhas.length === 0 && <div style={EMPTY}>Nenhuma campanha vinculada ainda.</div>}
        {campanhas.map(c => (
          <div key={c.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${C.borda}` }}>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:C.texto }}>{c.descricao}</div>
              <div style={{ fontSize:10, color:C.textoLeve, marginTop:1 }}>{fmtDate(c.data)}{c.categoria?` · ${c.categoria}`:""}</div>
            </div>
            <div style={{ fontSize:14, fontWeight:700, color:"#1B5E20" }}>+{fmtMoeda(c.valorMembro||0)}</div>
          </div>
        ))}
      </div>
    </div>
  );
}


function ApresentacoesTab({ songs, events, apresentacoes, isAdmin, onSave, accentColor }) {
  const RED = accentColor || "#B41020";
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", eventId:"", setlist:[] });
  const [activeApres, setActiveApres] = useState(null);
  const [modoApres, setModoApres] = useState(false);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [autoPlay, setAutoPlay] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const audioRef = React.useRef(null);

  const songMap = songs.reduce((acc,s)=>{acc[s.id]=s;return acc;},{});
  const today = new Date().toISOString().split("T")[0];
  const futureEvents = events.filter(e=>e.date>=today&&e.recurrence==="none");

  function addToSetlist(songId) {
    if (form.setlist.includes(songId)) return;
    setForm({...form, setlist:[...form.setlist, songId]});
  }

  function removeFromSetlist(songId) {
    setForm({...form, setlist:form.setlist.filter(id=>id!==songId)});
  }

  function moveUp(idx) {
    if (idx===0) return;
    const s=[...form.setlist]; [s[idx-1],s[idx]]=[s[idx],s[idx-1]];
    setForm({...form,setlist:s});
  }

  function moveDown(idx) {
    if (idx===form.setlist.length-1) return;
    const s=[...form.setlist]; [s[idx],s[idx+1]]=[s[idx+1],s[idx]];
    setForm({...form,setlist:s});
  }

  function saveApres() {
    if (!form.title) return;
    onSave([...apresentacoes, {...form, id:Date.now()}]);
    setForm({title:"",eventId:"",setlist:[]}); setShowForm(false);
  }

  function deleteApres(id) {
    if (window.confirm("Remover apresentação?")) onSave(apresentacoes.filter(a=>a.id!==id));
  }

  function openModo(apres) {
    setActiveApres(apres); setCurrentIdx(0); setModoApres(true); setAutoPlay(false);
  }

  function nextSong() {
    if (!activeApres) return;
    setCurrentIdx(i=>Math.min(i+1, activeApres.setlist.length-1));
  }

  function prevSong() { setCurrentIdx(i=>Math.max(i-1,0)); }

  const currentSong = activeApres ? songMap[activeApres.setlist[currentIdx]] : null;
  const playbackUrl = currentSong?.files?.playback;
  let playbackSrc = playbackUrl;
  if (playbackUrl) { const dm=playbackUrl.match(/\/d\/([^/]+)/); if(dm) playbackSrc="https://drive.google.com/uc?export=download&id="+dm[1]; }

  // Modo Apresentação (tela cheia)
  if (modoApres && activeApres) return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"#111", zIndex:9999, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ background:RED, padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ color:"#fff" }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700 }}>{activeApres.title}</div>
          <div style={{ fontSize:11, opacity:0.8 }}>{currentIdx+1} / {activeApres.setlist.length}</div>
        </div>
        <button onClick={()=>setModoApres(false)} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"#fff", borderRadius:6, padding:"6px 12px", cursor:"pointer", fontSize:12, fontWeight:700 }}>✕ Sair</button>
      </div>

      {/* Progress bar */}
      <div style={{ height:3, background:"rgba(255,255,255,0.1)" }}>
        <div style={{ height:"100%", background:RED, width:`${((currentIdx+1)/activeApres.setlist.length)*100}%`, transition:"width 0.3s" }}/>
      </div>

      {/* Setlist lateral + player */}
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
        {/* Setlist */}
        <div style={{ width:180, background:"#1a1a1a", overflowY:"auto", padding:8 }}>
          {activeApres.setlist.map((sid,i)=>{
            const s=songMap[sid];
            return (
              <div key={sid} onClick={()=>setCurrentIdx(i)} style={{ padding:"8px 10px", borderRadius:6, marginBottom:4, cursor:"pointer", background:i===currentIdx?RED:"transparent", border:"1px solid "+(i===currentIdx?RED:"rgba(255,255,255,0.1)") }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#fff", opacity:i===currentIdx?1:0.7 }}>{i+1}. {s?.title||"?"}</div>
                {s?.composer&&<div style={{ fontSize:10, color:"rgba(255,255,255,0.5)", marginTop:1 }}>{s.composer}</div>}
              </div>
            );
          })}
        </div>

        {/* Player principal */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, overflowY:"auto" }}>
          {currentSong ? (
            <>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:700, color:"#fff", textAlign:"center", marginBottom:8 }}>{currentSong.title}</div>
              {currentSong.composer&&<div style={{ fontSize:14, color:"rgba(255,255,255,0.6)", marginBottom:24, fontStyle:"italic" }}>{currentSong.composer}</div>}
              
              {/* Playback */}
              {playbackSrc ? (
                <div style={{ width:"100%", maxWidth:400, marginBottom:20 }}>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", textTransform:"uppercase", letterSpacing:1, marginBottom:6, textAlign:"center" }}>♪ Playback</div>
                  <audio ref={audioRef} controls autoPlay={autoPlay} style={{ width:"100%", height:40 }} src={playbackSrc} key={playbackSrc}/>
                </div>
              ) : (
                <div style={{ color:"rgba(255,255,255,0.3)", fontSize:13, marginBottom:20, fontStyle:"italic" }}>Sem playback cadastrado</div>
              )}

              {/* Toggle auto/manual */}
              <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                <button onClick={()=>setAutoPlay(false)} style={{ padding:"6px 16px", borderRadius:20, border:"1px solid rgba(255,255,255,0.3)", background:!autoPlay?"#fff":"transparent", color:!autoPlay?"#111":"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>▶ Manual</button>
                <button onClick={()=>setAutoPlay(true)} style={{ padding:"6px 16px", borderRadius:20, border:"1px solid rgba(255,255,255,0.3)", background:autoPlay?RED:"transparent", color:"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>⟳ Automático</button>
              </div>

              {/* Navegação */}
              <div style={{ display:"flex", gap:12 }}>
                <button onClick={prevSong} disabled={currentIdx===0} style={{ background:currentIdx===0?"rgba(255,255,255,0.1)":RED, color:"#fff", border:"none", borderRadius:8, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:currentIdx===0?"default":"pointer" }}>← Anterior</button>
                <button onClick={nextSong} disabled={currentIdx===activeApres.setlist.length-1} style={{ background:currentIdx===activeApres.setlist.length-1?"rgba(255,255,255,0.1)":RED, color:"#fff", border:"none", borderRadius:8, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:currentIdx===activeApres.setlist.length-1?"default":"pointer" }}>Próxima →</button>
              </div>

              {/* Letra */}
              {currentSong.letra && (
                <div style={{ marginTop:24, width:"100%", maxWidth:500, background:"rgba(255,255,255,0.05)", borderRadius:10, padding:16, maxHeight:200, overflowY:"auto" }}>
                  <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>🎵 Letra</div>
                  <div style={{ fontSize:13, lineHeight:1.8, color:"rgba(255,255,255,0.85)" }} dangerouslySetInnerHTML={{__html:currentSong.letra}}/>
                </div>
              )}
            </>
          ) : (
            <div style={{ color:"rgba(255,255,255,0.3)", fontSize:16 }}>Música não encontrada</div>
          )}
        </div>
      </div>
    </div>
  );

  // Lista de apresentações
  return (
    <div>
      {isAdmin && (
        <button onClick={()=>setShowForm(!showForm)} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", fontFamily:"inherit", marginBottom:18 }}>
          {showForm?"Cancelar":"+ Nova Apresentação"}
        </button>
      )}

      {showForm && isAdmin && (
        <div style={{ background:"#f9f9f9", border:"1px solid #E8E0E0", borderRadius:8, padding:16, marginBottom:16 }}>
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Nome da Apresentação *</label>
            <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Ex: Apresentação Dia das Mães" style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box" }}/>
          </div>
          {futureEvents.length > 0 && (
            <div style={{ marginBottom:12 }}>
              <label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Vincular a evento (opcional)</label>
              <select value={form.eventId} onChange={e=>setForm({...form,eventId:e.target.value})} style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box", background:"#fff" }}>
                <option value="">Sem vínculo</option>
                {futureEvents.map(e=><option key={e.id} value={e.id}>{e.title} — {e.date}</option>)}
              </select>
            </div>
          )}
          
          {/* Setlist builder */}
          <div style={{ fontSize:11, fontWeight:700, color:"#666", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Setlist ({form.setlist.length} músicas)</div>
          
          {/* Músicas selecionadas */}
          {form.setlist.length > 0 && (
            <div style={{ marginBottom:12, background:"#fff", border:"1px solid #E8E0E0", borderRadius:6, overflow:"hidden" }}>
              {form.setlist.map((sid,i)=>{
                const s=songMap[sid];
                return (
                  <div key={sid} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px", borderBottom:"1px solid #f0f0f0", background:i%2===0?"#fff":"#fafafa" }}>
                    <span style={{ fontSize:12, color:"#999", minWidth:20, fontWeight:700 }}>{i+1}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600 }}>{s?.title||"?"}</div>
                      {s?.composer&&<div style={{ fontSize:10, color:"#999" }}>{s.composer}</div>}
                    </div>
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>moveUp(i)} disabled={i===0} style={{ background:"none", border:"1px solid #ddd", borderRadius:4, padding:"2px 6px", cursor:"pointer", fontSize:12, color:i===0?"#ddd":"#666" }}>▲</button>
                      <button onClick={()=>moveDown(i)} disabled={i===form.setlist.length-1} style={{ background:"none", border:"1px solid #ddd", borderRadius:4, padding:"2px 6px", cursor:"pointer", fontSize:12, color:i===form.setlist.length-1?"#ddd":"#666" }}>▼</button>
                      <button onClick={()=>removeFromSetlist(sid)} style={{ background:"none", border:"1px solid #ffcdd2", borderRadius:4, padding:"2px 6px", cursor:"pointer", fontSize:12, color:"#B41020" }}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Adicionar músicas */}
          <div style={{ fontSize:10, color:"#999", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Adicionar ao setlist:</div>
          <div style={{ maxHeight:200, overflowY:"auto", border:"1px solid #E8E0E0", borderRadius:6, background:"#fff" }}>
            {[...songs].sort((a,b)=>a.title.localeCompare(b.title,"pt-BR")).map(s=>(
              <div key={s.id} onClick={()=>addToSetlist(s.id)} style={{ padding:"8px 12px", borderBottom:"1px solid #f0f0f0", cursor:form.setlist.includes(s.id)?"default":"pointer", background:form.setlist.includes(s.id)?"#f0f0f0":"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <span style={{ fontSize:13, color:form.setlist.includes(s.id)?"#aaa":"#1A1A1A", fontWeight:500 }}>{s.title}</span>
                  {s.category&&<span style={{ fontSize:10, color:"#999", marginLeft:6 }}>{s.category}</span>}
                </div>
                {form.setlist.includes(s.id) ? <span style={{ fontSize:11, color:"#1B5E20", fontWeight:700 }}>✓</span> : <span style={{ fontSize:18, color:RED }}>+</span>}
              </div>
            ))}
          </div>

          <button onClick={saveApres} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", fontFamily:"inherit", marginTop:12 }}>Salvar Apresentação</button>
        </div>
      )}

      {apresentacoes.length === 0 && <div style={{ textAlign:"center", color:"#ccc", fontSize:13, padding:"32px 0", fontStyle:"italic" }}>Nenhuma apresentação cadastrada ainda.</div>}

      {[...apresentacoes].sort((a,b)=>a.title.localeCompare(b.title,"pt-BR")).map(apres=>{
        const linkedEvent = events.find(e=>String(e.id)===String(apres.eventId));
        return (
          <div key={apres.id} style={{ background:"#fff", borderRadius:8, border:"1px solid #E8E0E0", marginBottom:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
            <div style={{ padding:"14px 16px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"#1A1A1A" }}>{apres.title}</div>
                  {linkedEvent && <div style={{ fontSize:11, color:"#666", marginTop:2 }}>📅 {linkedEvent.title} — {linkedEvent.date}</div>}
                  <div style={{ fontSize:11, color:"#999", marginTop:2 }}>{apres.setlist.length} música{apres.setlist.length!==1?"s":""} no setlist</div>
                  <div style={{ marginTop:6, display:"flex", flexWrap:"wrap", gap:4 }}>
                    {apres.setlist.map((sid,i)=>{
                      const s=songMap[sid];
                      return <span key={sid} style={{ fontSize:10, background:"#f5f5f5", border:"1px solid #E8E0E0", borderRadius:4, padding:"2px 6px", color:"#666" }}>{i+1}. {s?.title||"?"}</span>;
                    })}
                  </div>
                </div>
                {isAdmin && (
                  <button onClick={()=>deleteApres(apres.id)} style={{ background:"transparent", color:"#B41020", border:"1px solid #B41020", borderRadius:4, padding:"3px 8px", fontSize:11, cursor:"pointer", marginLeft:8 }}>✕</button>
                )}
              </div>
              <button onClick={()=>openModo(apres)} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", marginTop:12, fontFamily:"inherit" }}>
                🎵 Abrir Modo Apresentação
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────
function LoginScreen({members,onLogin}) {
  const [query,setQuery]=useState("");
  const [suggestions,setSuggestions]=useState([]);
  const [adminMode,setAdminMode]=useState(false);
  const [adminPwd,setAdminPwd]=useState("");
  const [error,setError]=useState("");

  useEffect(()=>{const s=localStorage.getItem("onix_user");if(s){try{onLogin(JSON.parse(s));}catch{}}},[ ]);
  function handleQuery(v){setQuery(v);setSuggestions(v.length>=3?members.filter(m=>m.name.toLowerCase().includes(v.toLowerCase())).slice(0,6):[]);}
  function selectUser(m){const u={...m,isAdmin:false};localStorage.setItem("onix_user",JSON.stringify(u));onLogin(u);}
  function loginAdmin(){if(adminPwd===ADMIN_PASSWORD){const u={id:0,name:"Administrador",isAdmin:true};localStorage.setItem("onix_user",JSON.stringify(u));onLogin(u);}else setError("Senha incorreta.");}

  return (
    <div style={{minHeight:"100vh",background:C.roxo,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet"/>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <img src={ONIX_LOGO} style={{height:110,width:110,borderRadius:12,objectFit:"contain",display:"block",margin:"0 auto 16px",background:"transparent"}} alt="Logo Ônix"/>
        <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:30,fontWeight:700,letterSpacing:1}}>Ônix Brasil</div>
        <div style={{fontFamily:"'Playfair Display',serif",color:C.laranja,fontSize:16,marginTop:4,letterSpacing:2}}>Vocal Internacional</div>
        <div style={{width:48,height:2,background:C.laranja,margin:"12px auto 8px"}}/>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,textTransform:"uppercase",letterSpacing:2}}>Goiânia, GO</div>
      </div>
      <div style={{background:C.branco,borderRadius:8,padding:28,width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(0,0,0,0.35)"}}>
        {!adminMode?(
          <>
            <div style={{fontSize:12,fontWeight:700,color:C.texto,marginBottom:18,textAlign:"center",textTransform:"uppercase",letterSpacing:0.8}}>Acesse com seu nome</div>
            <Inp label="Nome" placeholder="Digite pelo menos 3 letras..." value={query} onChange={handleQuery}/>
            {suggestions.length>0&&<div style={{border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden",marginTop:-8,marginBottom:12}}>{suggestions.map(m=><div key={m.id} onClick={()=>selectUser(m)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${C.borda}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:C.branco}}><div><span style={{fontSize:13,fontWeight:600,color:C.texto}}>{m.name}</span>{!m.active&&<span style={{fontSize:10,color:C.textoLeve,marginLeft:6}}>(inativo)</span>}</div><span style={{fontSize:9,color:VOICE_COLORS[m.voice],fontWeight:700,textTransform:"uppercase"}}>{VOICE_LABELS[m.voice]}</span></div>)}</div>}
            {query.length>=3&&suggestions.length===0&&<div style={{color:C.roxo,fontSize:12,textAlign:"center",marginBottom:12,fontStyle:"italic"}}>Nome não encontrado. Fale com a administração.</div>}
            <button onClick={()=>setAdminMode(true)} style={{background:"none",border:"none",color:C.textoLeve,fontSize:11,cursor:"pointer",width:"100%",textAlign:"center",marginTop:10,fontFamily:"inherit",textTransform:"uppercase",letterSpacing:0.8}}>Acesso administrativo</button>
          </>
        ):(
          <>
            <div style={{fontSize:12,fontWeight:700,color:C.texto,marginBottom:18,textAlign:"center",textTransform:"uppercase",letterSpacing:0.8}}>Administração</div>
            <Inp label="Senha" type="password" value={adminPwd} onChange={v=>{setAdminPwd(v);setError("");}}/>
            {error&&<div style={{color:"#B41020",fontSize:12,marginBottom:10,textAlign:"center"}}>{error}</div>}
            <button onClick={loginAdmin} style={BTN_P}>Entrar</button>
            <button onClick={()=>{setAdminMode(false);setAdminPwd("");setError("");}} style={{background:"none",border:"none",color:C.textoLeve,fontSize:11,cursor:"pointer",width:"100%",textAlign:"center",marginTop:10,fontFamily:"inherit"}}>← Voltar</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────
function OnixBrasil() {
  const [user,setUser]=useState(null);
  const [activeTab,setActiveTab]=useState(0);
  const [members,setMembers]=useState(()=>gs("onix_members",INIT_MEMBERS));
  const [events,setEvents]=useState(()=>gs("onix_events",INIT_EVENTS));
  const [songs,setSongs]=useState(()=>gs("onix_songs",INIT_SONGS));
  const [notices,setNotices]=useState(()=>gs("onix_notices",INIT_NOTICES));
  const [materials,setMaterials]=useState(()=>gs("onix_materials",INIT_MATERIALS));
  const [financeiro,setFinanceiro]=useState(()=>gs("onix_financeiro",INIT_FINANCEIRO));

  useEffect(()=>ss("onix_members",members),[members]);
  useEffect(()=>ss("onix_events",events),[events]);
  useEffect(()=>ss("onix_songs",songs),[songs]);
  useEffect(()=>ss("onix_notices",notices),[notices]);
  useEffect(()=>ss("onix_materials",materials),[materials]);
  useEffect(()=>ss("onix_financeiro",financeiro),[financeiro]);

  // Load from Firebase on first render
  useEffect(() => {
    loadFromFirebase([
      ["onix_members", setMembers, INIT_MEMBERS],
      ["onix_events", setEvents, INIT_EVENTS],
      ["onix_songs", setSongs, INIT_SONGS],
      ["onix_notices", setNotices, INIT_NOTICES],
      ["onix_materials", setMaterials, INIT_MATERIALS],
      ["onix_financeiro", setFinanceiro, INIT_FINANCEIRO],
      ["onix_song_cats", setSongCats, INIT_SONG_CATS_ONIX],
      ["onix_apresentacoes", setApresentacoes, []],
    ]);
  }, []);

  if(!user) return <LoginScreen members={members} onLogin={setUser}/>;

  const isAdmin=user.isAdmin;
  const currentMember=!isAdmin?members.find(m=>m.id===user.id):null;

  const tabs=[
    {label:"Agenda",icon:"📅"},
    {label:"Kits",icon:"🎵"},
    {label:"Estudos",icon:"📚"},
    {label:"Apresentações",icon:"🎬"},
    {label:"Declaração",icon:"📋"},
    ...(!isAdmin?[{label:"Meu Financeiro",icon:"💳"}]:[]),
    ...(isAdmin?[{label:"Financeiro",icon:"💰"},{label:"Relatório",icon:"📊"},{label:"Cadastro",icon:"👥"}]:[]),
  ];

  return (
    <div style={{minHeight:"100vh",background:C.fundo,fontFamily:"'Lato',sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet"/>
      <div style={{background:C.roxo,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(74,0,128,0.3)"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={ONIX_LOGO} style={{height:36,width:36,borderRadius:4,objectFit:"cover"}} alt="Logo Ônix"/>
          <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:17,fontWeight:700,letterSpacing:0.5}}>Ônix Brasil <span style={{color:C.laranja,fontSize:13}}>Vocal Internacional</span></div>
        </div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:10,textTransform:"uppercase",letterSpacing:1,marginTop:1}}>Olá, {user.name.split(" ")[0]}{isAdmin?" · Admin":""}</div>
        </div>
        <button onClick={()=>{localStorage.removeItem("onix_user");setUser(null);setActiveTab(0);}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",borderRadius:4,padding:"5px 12px",fontSize:10,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:0.8}}>Sair</button>
      </div>

      <div style={{padding:"18px 16px 90px",maxWidth:600,margin:"0 auto"}}>
        <NoticeBar notices={notices} members={members}/>
        {activeTab===0&&<AgendaTab events={events} isAdmin={isAdmin} onSave={setEvents} currentUser={user} members={members}/>}
        {activeTab===1&&<KitsTab songs={songs} isAdmin={isAdmin} onSave={setSongs} songCats={songCats} onSaveCats={setSongCats} accentColor={C.roxo}/>}
        {activeTab===2&&<EstudosTab materials={materials} isAdmin={isAdmin} onSave={setMaterials}/>}
        {activeTab===3&&<ApresentacoesTab songs={songs} events={events} apresentacoes={apresentacoes} isAdmin={isAdmin} onSave={setApresentacoes} accentColor={C.roxo}/>}
        {activeTab===4&&<DeclaracaoTab member={isAdmin?{id:0,name:"Lucia Kratz",voice:"soprano",startDate:"2026-01-01",endDate:""}:currentMember||member} isAdmin={isAdmin} members={members} events={events} pauloSig={PAULO_SIG} luciaSig={LUCIA_SIG}/>}
        {activeTab===5&&!isAdmin&&currentMember&&<MeuFinanceiroTab member={currentMember} financeiro={financeiro}/>}
        {activeTab===5&&isAdmin&&<FinanceiroTab financeiro={financeiro} onSave={setFinanceiro} members={members}/>}
        {activeTab===6&&isAdmin&&<RelatorioTab members={members} events={events} songs={songs} materials={materials} financeiro={financeiro} pauloSig={PAULO_SIG} luciaSig={LUCIA_SIG}/>}
        {activeTab===7&&isAdmin&&<CadastroTab members={members} onSave={setMembers} notices={notices} onSaveNotices={setNotices}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.branco,borderTop:`1px solid ${C.borda}`,display:"flex",zIndex:100,boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
        {tabs.map((tab,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",color:activeTab===i?C.roxo:C.textoLeve,borderTop:`2px solid ${activeTab===i?C.roxo:"transparent"}`,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4,display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit"}}>
            <span style={{fontSize:18}}>{tab.icon}</span>{tab.label}
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OnixBrasil />);
  </script>
</body>
</html>
