// Firebase sync utilities
let firebaseDB = null;
let firebaseInitialized = false;

async function initFirebase() {
  if (firebaseInitialized) return firebaseDB;
  try {
    const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
    const { getDatabase, ref, set, get, onValue } = await import('https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js');
    
    const apps = getApps();
    const app = apps.length ? apps[0] : initializeApp(FIREBASE_CONFIG);
    firebaseDB = getDatabase(app);
    firebaseInitialized = true;
    window._fbDB = firebaseDB;
    window._fbRef = ref;
    window._fbSet = set;
    window._fbGet = get;
    window._fbOnValue = onValue;
    return firebaseDB;
  } catch(e) {
    console.error('Firebase init error:', e);
    return null;
  }
}

async function fbSave(key, data) {
  try {
    const db = await initFirebase();
    if (!db) return;
    const { ref, set } = { ref: window._fbRef, set: window._fbSet };
    await set(ref(db, DB_PATH + '/' + key), data);
  } catch(e) {
    console.error('Firebase save error:', e);
  }
}

async function fbLoad(key, fallback) {
  try {
    const db = await initFirebase();
    if (!db) return fallback;
    const { ref, get } = { ref: window._fbRef, get: window._fbGet };
    const snap = await get(ref(db, DB_PATH + '/' + key));
    if (snap.exists()) return snap.val();
    return fallback;
  } catch(e) {
    console.error('Firebase load error:', e);
    return fallback;
  }
}

function fbWatch(key, callback) {
  initFirebase().then(db => {
    if (!db) return;
    const { ref, onValue } = { ref: window._fbRef, onValue: window._fbOnValue };
    onValue(ref(db, DB_PATH + '/' + key), snap => {
      if (snap.exists()) callback(snap.val());
    });
  });
}

// Local storage fallback (used for initial load, Firebase syncs after)
function gs(k, fb) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fb; } catch { return fb; } }
function ss(k, v) { 
  try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
  fbSave(k, v); // also sync to Firebase
}

// Load from Firebase on startup (overrides localStorage)
async function loadFromFirebase(setters) {
  await initFirebase();
  for (const [key, setter, fallback] of setters) {
    const data = await fbLoad(key, null);
    if (data !== null) {
      setter(data);
      try { localStorage.setItem(key, JSON.stringify(data)); } catch {}
    }
  }
}

function fmtDate(d) { if (!d) return ""; const [y, m, dd] = d.split("-"); return `${parseInt(dd)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`; }
function fmtDateShort(d) { if (!d) return ""; const [, m, dd] = d.split("-"); return `${parseInt(dd)}/${m}`; }
function fmtBday(d) { if (!d) return ""; const [, m, dd] = d.split("-"); return `${dd}/${m}`; }
function getBdays(members) { const mo = new Date().getMonth()+1; return members.filter(m => m.active && m.birthday && parseInt(m.birthday.split("-")[1])===mo); }
function todayStr() { return new Date().toISOString().split("T")[0]; }

// ── AGENDA ────────────────────────────────────────────────────
const EMPTY_FORM = { title:"", date:"", timeChegada:"", timeApresentacao:"", location:"", vestuario:"", description:"", recurrence:"none", recurrenceDay:4, status:"normal", statusNote:"" };

function AgendaTab({ events, isAdmin, onSave }) {
  const today = todayStr();
  const now = new Date();
  const [viewMonth, setViewMonth] = useState(now.getMonth());
  const [viewYear, setViewYear] = useState(now.getFullYear());
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState(EMPTY_FORM);
  const [statusEditId, setStatusEditId] = useState(null);
  const [statusForm, setStatusForm] = useState({ status:"normal", statusNote:"" });
  const [deleteModal, setDeleteModal] = useState(null); // {ev}

  function handleDelete(ev) {
    const isRecurring = ev.recurrence && ev.recurrence !== "none";
    if (isRecurring) {
      setDeleteModal(ev);
    } else {
      if (window.confirm("Remover este evento?")) {
        onSave(events.filter(e => String(e.id) !== String(ev.id)));
      }
    }
  }

  function confirmDelete(scope) {
    const ev = deleteModal;
    const baseId = String(ev.baseId || ev.id);
    if (scope === "all") {
      // Remove o evento base (todas as ocorrências somem)
      onSave(events.filter(e => String(e.id) !== baseId));
    } else {
      // Cancela só esta ocorrência marcando como cancelado nesta data
      // Adiciona uma exceção: cria evento único cancelado nesta data e ajusta a recorrência
      const base = events.find(e => String(e.id) === baseId);
      if (!base) return;
      // Cria exceção para esta data como evento único cancelado
      const exception = { ...base, id: Date.now(), date: ev.date, recurrence: "none", baseId: undefined, status: "cancelado", statusNote: "Ocorrência cancelada" };
      // Mantém o evento recorrente mas marca exceção via lista
      const exceptions = base.exceptions || [];
      const updated = events.map(e => String(e.id) === baseId ? { ...e, exceptions: [...exceptions, ev.date] } : e);
      onSave([...updated, exception]);
    }
    setDeleteModal(null);
  }

  function generateOccurrences(ev, vy, vm) {
    if (ev.recurrence === "none") return [ev];
    const result = [];
    const endDate = new Date(vy, vm + 3, 0);
    let cur = new Date(ev.date + "T12:00:00");
    let count = 0;
    while (cur <= endDate && count < 200) {
      const dateStr = cur.toISOString().split("T")[0];
      if (!ev.exceptions || !ev.exceptions.includes(dateStr)) {
        result.push({ ...ev, date: dateStr, id: String(ev.id) + "_" + count, baseId: ev.id });
      }
      if (ev.recurrence === "weekly") cur.setDate(cur.getDate() + 7);
      else if (ev.recurrence === "biweekly") cur.setDate(cur.getDate() + 14);
      else cur.setMonth(cur.getMonth() + 1);
      count++;
    }
    return result;
  }

  const monthStr = String(viewYear) + "-" + String(viewMonth+1).padStart(2,"0");
  const allOcc = events.flatMap(ev => generateOccurrences(ev, viewYear, viewMonth)).sort((a,b)=>a.date.localeCompare(b.date));
  const monthEvents = allOcc.filter(e => e.date.startsWith(monthStr));
  const nextEvents = allOcc.filter(e => e.date >= today).slice(0,3);
  const nextIds = new Set(nextEvents.map(e => e.id));

  function submit() {
    if (!form.title || !form.date) return;
    if (editId) onSave(events.map(e => e.id===editId ? {...e,...form} : e));
    else onSave([...events, {...form, id:Date.now()}]);
    setForm(EMPTY_FORM); setShowForm(false); setEditId(null);
  }

  function startEdit(ev) {
    const idToFind = ev.baseId || ev.id;
    const base = events.find(e => String(e.id) === String(idToFind));
    if (!base) return;
    setForm({ title:base.title, date:base.date, timeChegada:base.timeChegada||"", timeApresentacao:base.timeApresentacao||"", location:base.location||"", vestuario:base.vestuario||"", description:base.description||"", recurrence:base.recurrence||"none", recurrenceDay:base.recurrenceDay??4, status:base.status||"normal", statusNote:base.statusNote||"" });
    setEditId(base.id); setShowForm(true); window.scrollTo(0,0);
  }

  function saveStatus(ev) {
    const idToUpdate = ev.baseId || ev.id;
    onSave(events.map(e => String(e.id) === String(idToUpdate) ? {...e,...statusForm} : e));
    setStatusEditId(null);
  }

  function prevMonth() { if (viewMonth===0) { setViewMonth(11); setViewYear(y=>y-1); } else setViewMonth(m=>m-1); }
  function nextMonth() { if (viewMonth===11) { setViewMonth(0); setViewYear(y=>y+1); } else setViewMonth(m=>m+1); }

  function EventCard({ ev, highlight }) {
    const st = EVENT_STATUS.find(s=>s.key===(ev.status||"normal"))||EVENT_STATUS[0];
    const cancelled = ev.status && ev.status!=="normal";
    return (
      <div style={{ ...CARD, borderLeft:`3px solid ${cancelled?st.color:highlight?C.vermelho:C.verde}`, background:highlight?"#FFF8F8":C.branco }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div style={{ flex:1 }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, flexWrap:"wrap" }}>
              <span style={{ fontFamily:"'Playfair Display',serif", fontSize:15, fontWeight:700, color:cancelled?C.textoLeve:C.texto, textDecoration:cancelled?"line-through":"none" }}>{ev.title}</span>
              {ev.recurrence!=="none" && <span style={{ fontSize:9, color:C.verde, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8, border:`1px solid ${C.verde}`, borderRadius:3, padding:"1px 5px" }}>Recorrente</span>}
              {highlight && <span style={{ fontSize:9, color:C.vermelho, fontWeight:700, textTransform:"uppercase", border:`1px solid ${C.vermelho}`, borderRadius:3, padding:"1px 5px" }}>Próximo</span>}
            </div>
            <div style={{ fontSize:12, color:cancelled?st.color:C.textoSub, marginTop:3, fontWeight:600 }}>
              {fmtDate(ev.date)}{cancelled && <span style={{ marginLeft:6 }}>— {st.label}</span>}
            </div>
            {!cancelled && <>
              {ev.timeChegada && <div style={{ fontSize:11, color:C.textoSub, marginTop:2 }}>🕐 Chegada: <strong>{ev.timeChegada}</strong></div>}
              {ev.timeApresentacao && <div style={{ fontSize:11, color:C.vermelho, marginTop:1 }}>🎶 Apresentação: <strong>{ev.timeApresentacao}</strong></div>}
              {ev.location && <div style={{ fontSize:11, color:C.textoLeve, marginTop:2 }}>📍 {ev.location}</div>}
              {ev.vestuario && <div style={{ fontSize:11, color:C.textoLeve, marginTop:1 }}>👔 {ev.vestuario}</div>}
              {ev.description && <div style={{ fontSize:11, color:C.textoLeve, marginTop:1, fontStyle:"italic" }}>{ev.description}</div>}
            </>}
            {ev.statusNote && <div style={{ fontSize:11, color:C.textoSub, marginTop:2, fontStyle:"italic" }}>{ev.statusNote}</div>}
          </div>
          {isAdmin && (
            <div style={{ display:"flex", gap:4, marginLeft:8, flexShrink:0, flexDirection:"column", alignItems:"flex-end" }}>
              <button onClick={()=>{ setStatusEditId(statusEditId===ev.id?null:ev.id); setStatusForm({ status:ev.status||"normal", statusNote:ev.statusNote||"" }); }} style={BTN_SM(st.color)}>Status</button>
              <button onClick={()=>startEdit(ev)} style={BTN_SM("#1565C0")}>✏ Editar</button>
              <button onClick={()=>handleDelete(ev)} style={BTN_SM(C.vermelho)}>✕ Excluir</button>
            </div>
          )}
        </div>
        {statusEditId===ev.id && (
          <div style={{ marginTop:12, paddingTop:12, borderTop:`1px solid ${C.borda}` }}>
            <div style={LS}>Alterar status</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
              {EVENT_STATUS.map(s=>(
                <button key={s.key} onClick={()=>setStatusForm({...statusForm,status:s.key})} style={{ padding:"5px 10px", borderRadius:4, border:`1px solid ${statusForm.status===s.key?s.color:C.borda}`, cursor:"pointer", fontSize:11, fontWeight:700, background:statusForm.status===s.key?s.color:"#fff", color:statusForm.status===s.key?"#fff":C.textoSub, fontFamily:"inherit" }}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            {(statusForm.status==="outros"||statusForm.status==="reagendado") && <Inp label="Observação" value={statusForm.statusNote} onChange={v=>setStatusForm({...statusForm,statusNote:v})} placeholder={statusForm.status==="reagendado"?"Nova data/informação...":"Motivo..."} />}
            <div style={{ display:"flex", gap:8 }}>
              <button onClick={()=>saveStatus(ev)} style={{...BTN_RED,padding:"8px 14px",fontSize:12}}>Salvar</button>
              <button onClick={()=>setStatusEditId(null)} style={{...BTN_RED,background:"#aaa",padding:"8px 14px",fontSize:12}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      {/* Modal de exclusão */}
      {deleteModal && (
        <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"rgba(0,0,0,0.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div style={{ background:"#fff", borderRadius:10, padding:24, maxWidth:320, width:"100%", boxShadow:"0 8px 32px rgba(0,0,0,0.2)" }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:C.texto, marginBottom:8 }}>Excluir evento recorrente</div>
            <div style={{ fontSize:13, color:C.textoSub, marginBottom:20, lineHeight:1.5 }}>
              <strong>{deleteModal.title}</strong> é um evento recorrente.<br/>O que deseja excluir?
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <button onClick={()=>confirmDelete("this")} style={{ ...BTN_SM(C.vermelho), padding:"10px 14px", fontSize:12, textAlign:"left" }}>

function RichTextEditor({ value, onChange, readonly }) {
  const ref = React.useRef(null);
  const [showToolbar, setShowToolbar] = React.useState(false);

  React.useEffect(() => {
    if (ref.current && ref.current.innerHTML !== value) {
      ref.current.innerHTML = value || "";
    }
  }, []);

  function exec(cmd, val) {
    ref.current.focus();
    document.execCommand(cmd, false, val);
    onChange(ref.current.innerHTML);
  }

  if (readonly) {
    return (
      <div style={{ fontSize:14, lineHeight:1.8, color:"#1A1A1A" }}
        dangerouslySetInnerHTML={{ __html: value || "<em style='color:#aaa'>Letra não cadastrada.</em>" }} />
    );
  }

  return (
    <div style={{ border:"1px solid #E8E0E0", borderRadius:8, overflow:"hidden" }}>
      <div style={{ background:"#f5f5f5", padding:"6px 8px", display:"flex", gap:4, flexWrap:"wrap", borderBottom:"1px solid #E8E0E0" }}>
        {[
          { cmd:"bold", label:"<b>N</b>", title:"Negrito" },
          { cmd:"italic", label:"<i>I</i>", title:"Itálico" },
          { cmd:"underline", label:"<u>S</u>", title:"Sublinhado" },
        ].map(t => (
          <button key={t.cmd} onMouseDown={e=>{ e.preventDefault(); exec(t.cmd); }}
            title={t.title}
            style={{ background:"#fff", border:"1px solid #ddd", borderRadius:4, padding:"3px 8px", cursor:"pointer", fontSize:13, minWidth:28 }}
            dangerouslySetInnerHTML={{ __html: t.label }} />
        ))}
        <select onMouseDown={e=>e.stopPropagation()} onChange={e=>exec("fontSize", e.target.value)} style={{ fontSize:11, border:"1px solid #ddd", borderRadius:4, padding:"2px 4px", background:"#fff" }}>
          <option value="">Tamanho</option>
          {[1,2,3,4,5].map(s=><option key={s} value={s}>{["Muito pequeno","Pequeno","Normal","Grande","Muito grande"][s-1]}</option>)}
        </select>
        {[
          { cmd:"justifyLeft", label:"⬅", title:"Alinhar esquerda" },
          { cmd:"justifyCenter", label:"≡", title:"Centralizar" },
          { cmd:"justifyRight", label:"➡", title:"Alinhar direita" },
        ].map(t => (
          <button key={t.cmd} onMouseDown={e=>{ e.preventDefault(); exec(t.cmd); }}
            title={t.title}
            style={{ background:"#fff", border:"1px solid #ddd", borderRadius:4, padding:"3px 8px", cursor:"pointer", fontSize:13 }}>
            {t.label}
          </button>
        ))}
        <input type="color" title="Cor do texto" onMouseDown={e=>e.stopPropagation()}
          onChange={e=>exec("foreColor", e.target.value)}
          style={{ width:28, height:26, border:"1px solid #ddd", borderRadius:4, cursor:"pointer", padding:1 }} />
      </div>
      <div ref={ref} contentEditable suppressContentEditableWarning
        onInput={()=>onChange(ref.current.innerHTML)}
        style={{ minHeight:120, padding:"12px 14px", fontSize:14, lineHeight:1.8, outline:"none", color:"#1A1A1A" }}
        data-placeholder="Digite a letra aqui..." />
    </div>
  );
}

function FilePlayer({ url, label, icon, type }) {
  if (!url || !url.trim()) return null;
  if (type === "doc") return (
    <a href={url} target="_blank" rel="noreferrer" style={{ display:"flex", alignItems:"center", gap:8, background:"#f9f9f9", border:"1px solid #E8E0E0", borderRadius:6, padding:"10px 12px", color:"#666", textDecoration:"none", fontSize:12, fontWeight:700, marginBottom:8 }}>
      <span style={{ fontSize:16 }}>{icon}</span>
      <span>{label}</span>
      <span style={{ marginLeft:"auto", fontSize:10, color:"#999", background:"#fff", border:"1px solid #E8E0E0", borderRadius:4, padding:"2px 6px" }}>Abrir ↗</span>
    </a>
  );
  let src = url;
  const dm = url && url.match(/\/d\/([^/]+)/);
  if (dm) src = "https://drive.google.com/uc?export=download&id=" + dm[1];
  return (
    <div style={{ marginBottom:10 }}>
      <div style={{ fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8, marginBottom:4, color:"#666" }}>{icon} {label}</div>
      <audio controls style={{ width:"100%", height:34 }} src={src} />
    </div>
  );
}

    if (!form.title) return;
    const files = {}; FILE_FIELDS.forEach(f=>files[f.key]="");

// ── PDF GENERATOR ─────────────────────────────────────────────
function generatePDF(htmlContent, filename) {
  const full = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:Arial,sans-serif; color:#1A1A1A; background:#fff; }
    @media print { .no-print { display:none !important; } body { -webkit-print-color-adjust:exact; print-color-adjust:exact; } }
  </style></head><body>
  <div class="no-print" style="background:#1B5E20;color:#fff;padding:14px 20px;text-align:center;font-family:Arial;font-size:14px;position:sticky;top:0;z-index:99;">
    📄 Para salvar como PDF: toque em <strong>Compartilhar</strong> ou use <strong>Ctrl+P → Salvar como PDF</strong>
    <button onclick="window.print()" style="margin-left:12px;background:#fff;color:#1B5E20;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-weight:700;font-size:14px;">🖨️ Imprimir / PDF</button>
  </div>
  ${htmlContent}</body></html>`;
  const blob = new Blob([full], {type:"text/html;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, "_blank");
  if (!win) {
    // fallback: download
    const a = document.createElement("a");
    a.href = url; a.download = filename + ".html";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
  }
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}


// QR Code generator using Google Charts API
function generateQRCode(text) {
  const encoded = encodeURIComponent(text);
  return `https://chart.googleapis.com/chart?cht=qr&chs=200x200&chl=${encoded}&choe=UTF-8`;
}

// Save declaration to Firebase and return ID
async function saveDeclaracao(data) {
  const id = Date.now().toString(36) + Math.random().toString(36).substr(2,5);
  try {
    await fbSave("declaracoes/" + id, { ...data, id, emitidaEm: new Date().toISOString().split("T")[0] });
  } catch(e) { console.error(e); }
  return id;
}

  function getPresencas() {
    const start = startDate;
    const end = endDate;
    return events.filter(e => e.date >= start && e.date <= end && (e.status||"normal")==="normal" && e.recurrence==="none");
  }

  const apresentacoes = getPresencas();

  function gerarDeclaracao() {
    const [sy,sm,sd] = startDate.split("-");
    const [ey,em,ed] = endDate.split("-");
    const periodoTexto = startDate===endDate
      ? fmtDate(startDate)
      : `${parseInt(sd)} de ${MONTHS_PT[parseInt(sm)-1]} de ${sy} a ${parseInt(ed)} de ${MONTHS_PT[parseInt(em)-1]} de ${ey}`;

    const html = `
    <div style="max-width:700px;margin:0 auto;padding:0;">
      <div style="background:#B41020;padding:24px 40px 18px;color:#fff;">
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:1px;">Coral Flamboyant</div>
        <div style="font-size:10px;margin-top:4px;opacity:0.8;text-transform:uppercase;letter-spacing:2px;">Shopping Flamboyant · Goiânia, GO</div>
      </div>
      <div style="background:#1B5E20;height:5px;"></div>
      <div style="padding:40px 40px 32px;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1A1A1A;text-transform:uppercase;letter-spacing:2px;">Declaração de Participação</div>
          <div style="width:60px;height:2px;background:#B41020;margin:10px auto;"></div>
        </div>
        <p style="font-size:13px;line-height:2;color:#333;text-align:justify;">
          Declaramos para os devidos fins que <strong>${member.name}</strong>, participante do Coral Flamboyant na categoria <strong>${VOICE_LABELS[member.voice]}</strong>, integrou ativamente as atividades corais no período de <strong>${periodoTexto}</strong>, realizadas no Shopping Flamboyant, localizado na Av. Deputado Jamel Cecílio, 3300, Jardim Goiás, Goiânia — GO.
        </p>
        <p style="font-size:13px;line-height:2;color:#333;text-align:justify;margin-top:14px;">
          Durante o período mencionado, o(a) participante tomou parte nos ensaios semanais e demais atividades promovidas pelo grupo, contribuindo para o desenvolvimento artístico e cultural do Coral Flamboyant.
        </p>
        ${apresentacoes.length>0?`
        <div style="margin-top:24px;">
          <div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#B41020;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;border-bottom:1px solid #B41020;padding-bottom:5px;display:inline-block;">Apresentações no Período</div>
          <ul style="margin-top:10px;padding-left:20px;">
            ${apresentacoes.map(e=>`<li style="font-size:12px;color:#333;margin-bottom:4px;">${fmtDate(e.date)} — ${e.title}${e.location?" · "+e.location:""}</li>`).join("")}
          </ul>
        </div>`:""}
        <p style="font-size:13px;line-height:2;color:#333;margin-top:24px;">
          Goiânia, ${fmtDate(today)}.
        </p>
        <div style="margin-top:48px;display:flex;justify-content:space-around;gap:40px;">
          <div style="text-align:center;flex:1;">
            ${pauloSig?`<img src="${pauloSig}" style="height:75px;object-fit:contain;display:block;margin:0 auto 4px;" />`:"<div style='height:55px;border-bottom:1px solid #333;'></div>"}
            <div style="font-size:11px;font-weight:700;color:#1A1A1A;margin-top:4px;">Paulo Sergio Motta</div>
            <div style="font-size:10px;color:#666;">Maestro — Coral Flamboyant</div>
          </div>
          <div style="text-align:center;flex:1;">
            ${luciaSig?`<img src="${luciaSig}" style="height:75px;object-fit:contain;display:block;margin:0 auto 4px;" />`:"<div style='height:55px;border-bottom:1px solid #333;'></div>"}
            <div style="font-size:11px;font-weight:700;color:#1A1A1A;margin-top:4px;">Lucia Kratz</div>
            <div style="font-size:10px;color:#666;">Produtora — Coral Flamboyant</div>
          </div>
        </div>
        <div style="margin-top:36px;padding-top:14px;border-top:1px solid #eee;text-align:center;font-size:10px;color:#aaa;">
          Coral Flamboyant · Shopping Flamboyant · Goiânia, GO · Documento gerado em ${fmtDate(today)}
        </div>
      </div>
    </div>`;
    // Save to Firebase and generate QR
    const declData = {
      coral: "flamboyant",
      nome: member.name,
      funcao: VOICE_LABELS[member.voice] || "Corista",
      startDate: startDate,
      endDate: member.endDate || "",
      apresentacoes: apresentacoes.map(e => `${fmtDate(e.date)} — ${e.title}`)
    };
    saveDeclaracao(declData).then(id => {
      const verifyURL = `https://luciakratz-arch.github.io/coral-flamboyant/verificar.html?id=${id}`;
      const qrURL = generateQRCode(verifyURL);
      const htmlComQR = html.replace(
        `<div style="margin-top:40px;padding-top:14px;border-top:1px solid #eee;text-align:center;font-size:10px;color:#aaa;">`,
        `<div style="text-align:center;margin-top:24px;padding:16px;background:#fff5f5;border-radius:8px;border:1px solid #f0d0d0;">
          <div style="font-size:11px;color:#B41020;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">Verificação Online</div>
          <img src="${qrURL}" style="width:100px;height:100px;display:block;margin:0 auto 8px;" alt="QR Code"/>
          <div style="font-size:9px;color:#999;word-break:break-all;">${verifyURL}</div>
          <div style="font-size:11px;color:#666;margin-top:6px;">📞 (62) 9 9148-9893 — Paulo Sergio Motta</div>
        </div>
        <div style="margin-top:40px;padding-top:14px;border-top:1px solid #eee;text-align:center;font-size:10px;color:#aaa;">`
      );
      generatePDF(htmlComQR, `Declaracao_${member.name.replace(/ /g,"_")}`);
    });
  }

  return (
    <div>
      <div style={{ background:C.verde, borderRadius:8, padding:"16px 18px", marginBottom:20, color:"#fff" }}>
        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700 }}>{member.name}</div>
        <div style={{ fontSize:11, marginTop:3, opacity:0.85, textTransform:"uppercase", letterSpacing:0.8 }}>{VOICE_LABELS[member.voice]} · Declaração de Participação</div>
      </div>
      <div style={CARD}>
        <div style={{ fontSize:12, color:C.textoSub, marginBottom:6 }}>Período de participação:</div>
        <div style={{ fontSize:14, fontWeight:700, color:C.texto }}>
          {fmtDate(startDate)} {member.endDate ? `a ${fmtDate(member.endDate)}` : "até o momento"}
        </div>
        {apresentacoes.length>0 && (
          <div style={{ marginTop:12 }}>
            <div style={{ fontSize:11, color:C.textoSub, textTransform:"uppercase", letterSpacing:0.8, marginBottom:8 }}>Apresentações no período ({apresentacoes.length})</div>
            {apresentacoes.map(e=>(
              <div key={e.id} style={{ fontSize:12, color:C.texto, padding:"4px 0", borderBottom:`1px solid ${C.borda}` }}>
                {fmtDateShort(e.date)} — {e.title}
              </div>
            ))}
          </div>
        )}
      </div>
      <button onClick={gerarDeclaracao} style={{...BTN_GRN}}>⬇ Baixar Declaração em PDF</button>
    </div>
  );
}

// ── CADASTRO ─────────────────────────────────────────────────
function CadastroTab({ members, onSave, notices, onSaveNotices }) {
  const [section, setSection] = useState("members");
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name:"", voice:"soprano", birthday:"", whatsapp:"", active:true, startDate:todayStr(), endDate:"" });
  const [noticeText, setNoticeText] = useState("");
  const active = members.filter(m=>m.active);
  const inactive = members.filter(m=>!m.active);

  function submitMember() {
    if (!form.name) return;
    if (editId) onSave(members.map(m=>m.id===editId?{...m,...form}:m));
    else onSave([...members,{...form,id:Date.now()}]);
    setForm({name:"",voice:"soprano",birthday:"",whatsapp:"",active:true,startDate:todayStr(),endDate:""});
    setShowForm(false); setEditId(null);
  }

  function deactivate(m) {
    const endDate = todayStr();
    onSave(members.map(x=>x.id===m.id?{...x,active:false,endDate}:x));
  }

  function MemberRow({ m }) {
    return (
      <div style={{...CARD, opacity:m.active?1:0.65}}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:14, color:C.texto }}>{m.name}</div>
            <div style={{ display:"flex", gap:7, marginTop:5, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontSize:10, color:VOICE_COLORS[m.voice], fontWeight:700, textTransform:"uppercase", letterSpacing:0.5, border:`1px solid ${VOICE_COLORS[m.voice]}`, borderRadius:3, padding:"1px 6px" }}>{VOICE_LABELS[m.voice]}</span>
              {m.birthday && <span style={{ fontSize:11, color:C.textoLeve }}>🎂 {fmtBday(m.birthday)}</span>}
              {m.whatsapp && <span style={{ fontSize:11, color:C.textoLeve }}>📱 {m.whatsapp}</span>}
            </div>
            <div style={{ fontSize:10, color:C.textoLeve, marginTop:4 }}>
              Desde: {fmtDate(m.startDate||"")}
              {m.endDate && ` · Saída: ${fmtDate(m.endDate)}`}
            </div>
          </div>
          <div style={{ display:"flex", gap:4, flexDirection:"column", alignItems:"flex-end" }}>
            <button onClick={()=>{ setForm({name:m.name,voice:m.voice,birthday:m.birthday||"",whatsapp:m.whatsapp||"",active:m.active,startDate:m.startDate||"",endDate:m.endDate||""}); setEditId(m.id); setShowForm(true); }} style={BTN_SM("#1565C0")}>✏ Editar</button>
            {m.active
              ? <button onClick={()=>deactivate(m)} style={BTN_SM(C.verde)}>Desativar</button>
              : <button onClick={()=>onSave(members.map(x=>x.id===m.id?{...x,active:true,endDate:""}:x))} style={BTN_SM(C.verde)}>Reativar</button>
            }
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div style={{ display:"flex", gap:0, marginBottom:20, border:`1px solid ${C.borda}`, borderRadius:6, overflow:"hidden" }}>
        {["members","notices"].map(s=>(
          <button key={s} onClick={()=>setSection(s)} style={{ flex:1, padding:"10px", border:"none", cursor:"pointer", fontFamily:"inherit", background:section===s?C.vermelho:C.branco, color:section===s?"#fff":C.textoSub, fontWeight:700, fontSize:11, textTransform:"uppercase", letterSpacing:0.8 }}>
            {s==="members"?`Coristas (${active.length} ativos)`:"Avisos"}
          </button>
        ))}
      </div>

      {section==="members" && (
        <>
          <button onClick={()=>{ setShowForm(!showForm); setEditId(null); setForm({name:"",voice:"soprano",birthday:"",whatsapp:"",active:true,startDate:todayStr(),endDate:""}); }} style={{...BTN_RED,marginBottom:16}}>
            {showForm?"Cancelar":"+ Novo Corista"}
          </button>
          {showForm && (
            <div style={FORM}>
              <Inp label="Nome completo *" value={form.name} onChange={v=>setForm({...form,name:v})} />
              <div style={{ marginBottom:12 }}>
                <label style={LS}>Naipe / Voz</label>
                <select value={form.voice} onChange={e=>setForm({...form,voice:e.target.value})} style={IS}>
                  {Object.entries(VOICE_LABELS).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
              <Inp label="Data de aniversário" type="date" value={form.birthday} onChange={v=>setForm({...form,birthday:v})} />
              <Inp label="WhatsApp" placeholder="62999990000" value={form.whatsapp} onChange={v=>setForm({...form,whatsapp:v})} />
              <Inp label="Data de início no coral" type="date" value={form.startDate} onChange={v=>setForm({...form,startDate:v})} />
              <button onClick={submitMember} style={BTN_RED}>{editId?"Salvar Alterações":"Cadastrar Corista"}</button>
            </div>
          )}
          {active.length>0 && <>
            <div style={{ fontSize:10, color:C.textoLeve, textTransform:"uppercase", letterSpacing:1.5, marginBottom:10 }}>Ativos ({active.length})</div>
            {active.map(m=><MemberRow key={m.id} m={m} />)}
          </>}
          {inactive.length>0 && <>
            <div style={{ fontSize:10, color:C.textoLeve, textTransform:"uppercase", letterSpacing:1.5, margin:"16px 0 10px" }}>Histórico — Inativos ({inactive.length})</div>
            {inactive.map(m=><MemberRow key={m.id} m={m} />)}
          </>}
        </>
      )}

      {section==="notices" && (
        <>
          <div style={FORM}>
            <label style={LS}>Novo Aviso</label>
            <textarea value={noticeText} onChange={e=>setNoticeText(e.target.value)} placeholder="Digite o aviso..." style={{...IS,height:80,resize:"vertical"}} />
            <button onClick={()=>{ if(!noticeText.trim()) return; onSaveNotices([...notices,{id:Date.now(),text:noticeText,date:todayStr(),author:"Administração"}]); setNoticeText(""); }} style={{...BTN_RED,marginTop:10}}>Publicar</button>
          </div>
          {[...notices].reverse().map(n=>(
            <div key={n.id} style={CARD}>
              <div style={{ fontSize:10, color:C.vermelho, fontWeight:700, textTransform:"uppercase", letterSpacing:0.8, marginBottom:5 }}>{n.author} · {fmtDateShort(n.date)}</div>
              <div style={{ fontSize:13, color:C.texto, lineHeight:1.5 }}>{n.text}</div>
              <button onClick={()=>{ if(window.confirm("Remover aviso?")) onSaveNotices(notices.filter(x=>x.id!==n.id)); }} style={{...BTN_SM(C.vermelho),marginTop:10}}>Remover</button>
            </div>
          ))}
        </>
      )}
    </div>
  );
}


function ApresentacoesTab({ songs, events, apresentacoes, isAdmin, onSave, accentColor }) {
  const RED = accentColor || "#B41020";
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", eventId:"", setlist:[] });
  const [activeApres, setActiveApres] = useState(null);
  const [modoApres, setModoApres] = useState(false);
  const [currentIdx, setCurrentIdx] = useState(0);
  const [autoPlay, setAutoPlay] = useState(false);
  const [dragIdx, setDragIdx] = useState(null);
  const audioRef = React.useRef(null);

  const songMap = songs.reduce((acc,s)=>{acc[s.id]=s;return acc;},{});
  const today = new Date().toISOString().split("T")[0];
  const futureEvents = events.filter(e=>e.date>=today&&e.recurrence==="none");

  function addToSetlist(songId) {
    if (form.setlist.includes(songId)) return;
    setForm({...form, setlist:[...form.setlist, songId]});
  }

  function removeFromSetlist(songId) {
    setForm({...form, setlist:form.setlist.filter(id=>id!==songId)});
  }

  function moveUp(idx) {
    if (idx===0) return;
    const s=[...form.setlist]; [s[idx-1],s[idx]]=[s[idx],s[idx-1]];
    setForm({...form,setlist:s});
  }

  function moveDown(idx) {
    if (idx===form.setlist.length-1) return;
    const s=[...form.setlist]; [s[idx],s[idx+1]]=[s[idx+1],s[idx]];
    setForm({...form,setlist:s});
  }

  function saveApres() {
    if (!form.title) return;
    onSave([...apresentacoes, {...form, id:Date.now()}]);
    setForm({title:"",eventId:"",setlist:[]}); setShowForm(false);
  }

  function deleteApres(id) {
    if (window.confirm("Remover apresentação?")) onSave(apresentacoes.filter(a=>a.id!==id));
  }

  function openModo(apres) {
    setActiveApres(apres); setCurrentIdx(0); setModoApres(true); setAutoPlay(false);
  }

  function nextSong() {
    if (!activeApres) return;
    setCurrentIdx(i=>Math.min(i+1, activeApres.setlist.length-1));
  }

  function prevSong() { setCurrentIdx(i=>Math.max(i-1,0)); }

  const currentSong = activeApres ? songMap[activeApres.setlist[currentIdx]] : null;
  const playbackUrl = currentSong?.files?.playback;
  let playbackSrc = playbackUrl;
  if (playbackUrl) { const dm=playbackUrl.match(/\/d\/([^/]+)/); if(dm) playbackSrc="https://drive.google.com/uc?export=download&id="+dm[1]; }

  // Modo Apresentação (tela cheia)
  if (modoApres && activeApres) return (
    <div style={{ position:"fixed", top:0, left:0, right:0, bottom:0, background:"#111", zIndex:9999, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ background:RED, padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ color:"#fff" }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700 }}>{activeApres.title}</div>
          <div style={{ fontSize:11, opacity:0.8 }}>{currentIdx+1} / {activeApres.setlist.length}</div>
        </div>
        <button onClick={()=>setModoApres(false)} style={{ background:"rgba(255,255,255,0.2)", border:"none", color:"#fff", borderRadius:6, padding:"6px 12px", cursor:"pointer", fontSize:12, fontWeight:700 }}>✕ Sair</button>
      </div>

      {/* Progress bar */}
      <div style={{ height:3, background:"rgba(255,255,255,0.1)" }}>
        <div style={{ height:"100%", background:RED, width:`${((currentIdx+1)/activeApres.setlist.length)*100}%`, transition:"width 0.3s" }}/>
      </div>

      {/* Setlist lateral + player */}
      <div style={{ flex:1, display:"flex", overflow:"hidden" }}>
        {/* Setlist */}
        <div style={{ width:180, background:"#1a1a1a", overflowY:"auto", padding:8 }}>
          {activeApres.setlist.map((sid,i)=>{
            const s=songMap[sid];
            return (
              <div key={sid} onClick={()=>setCurrentIdx(i)} style={{ padding:"8px 10px", borderRadius:6, marginBottom:4, cursor:"pointer", background:i===currentIdx?RED:"transparent", border:"1px solid "+(i===currentIdx?RED:"rgba(255,255,255,0.1)") }}>
                <div style={{ fontSize:11, fontWeight:700, color:"#fff", opacity:i===currentIdx?1:0.7 }}>{i+1}. {s?.title||"?"}</div>
                {s?.composer&&<div style={{ fontSize:10, color:"rgba(255,255,255,0.5)", marginTop:1 }}>{s.composer}</div>}
              </div>
            );
          })}
        </div>

        {/* Player principal */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, overflowY:"auto" }}>
          {currentSong ? (
            <>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:28, fontWeight:700, color:"#fff", textAlign:"center", marginBottom:8 }}>{currentSong.title}</div>
              {currentSong.composer&&<div style={{ fontSize:14, color:"rgba(255,255,255,0.6)", marginBottom:24, fontStyle:"italic" }}>{currentSong.composer}</div>}
              
              {/* Playback */}
              {playbackSrc ? (
                <div style={{ width:"100%", maxWidth:400, marginBottom:20 }}>
                  <div style={{ fontSize:11, color:"rgba(255,255,255,0.5)", textTransform:"uppercase", letterSpacing:1, marginBottom:6, textAlign:"center" }}>♪ Playback</div>
                  <audio ref={audioRef} controls autoPlay={autoPlay} style={{ width:"100%", height:40 }} src={playbackSrc} key={playbackSrc}/>
                </div>
              ) : (
                <div style={{ color:"rgba(255,255,255,0.3)", fontSize:13, marginBottom:20, fontStyle:"italic" }}>Sem playback cadastrado</div>
              )}

              {/* Toggle auto/manual */}
              <div style={{ display:"flex", gap:8, marginBottom:20 }}>
                <button onClick={()=>setAutoPlay(false)} style={{ padding:"6px 16px", borderRadius:20, border:"1px solid rgba(255,255,255,0.3)", background:!autoPlay?"#fff":"transparent", color:!autoPlay?"#111":"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>▶ Manual</button>
                <button onClick={()=>setAutoPlay(true)} style={{ padding:"6px 16px", borderRadius:20, border:"1px solid rgba(255,255,255,0.3)", background:autoPlay?RED:"transparent", color:"#fff", cursor:"pointer", fontSize:12, fontWeight:700 }}>⟳ Automático</button>
              </div>

              {/* Navegação */}
              <div style={{ display:"flex", gap:12 }}>
                <button onClick={prevSong} disabled={currentIdx===0} style={{ background:currentIdx===0?"rgba(255,255,255,0.1)":RED, color:"#fff", border:"none", borderRadius:8, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:currentIdx===0?"default":"pointer" }}>← Anterior</button>
                <button onClick={nextSong} disabled={currentIdx===activeApres.setlist.length-1} style={{ background:currentIdx===activeApres.setlist.length-1?"rgba(255,255,255,0.1)":RED, color:"#fff", border:"none", borderRadius:8, padding:"12px 24px", fontSize:14, fontWeight:700, cursor:currentIdx===activeApres.setlist.length-1?"default":"pointer" }}>Próxima →</button>
              </div>

              {/* Letra */}
              {currentSong.letra && (
                <div style={{ marginTop:24, width:"100%", maxWidth:500, background:"rgba(255,255,255,0.05)", borderRadius:10, padding:16, maxHeight:200, overflowY:"auto" }}>
                  <div style={{ fontSize:10, color:"rgba(255,255,255,0.4)", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>🎵 Letra</div>
                  <div style={{ fontSize:13, lineHeight:1.8, color:"rgba(255,255,255,0.85)" }} dangerouslySetInnerHTML={{__html:currentSong.letra}}/>
                </div>
              )}
            </>
          ) : (
            <div style={{ color:"rgba(255,255,255,0.3)", fontSize:16 }}>Música não encontrada</div>
          )}
        </div>
      </div>
    </div>
  );

  // Lista de apresentações
  return (
    <div>
      {isAdmin && (
        <button onClick={()=>setShowForm(!showForm)} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", fontFamily:"inherit", marginBottom:18 }}>
          {showForm?"Cancelar":"+ Nova Apresentação"}
        </button>
      )}

      {showForm && isAdmin && (
        <div style={{ background:"#f9f9f9", border:"1px solid #E8E0E0", borderRadius:8, padding:16, marginBottom:16 }}>
          <div style={{ marginBottom:10 }}>
            <label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Nome da Apresentação *</label>
            <input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Ex: Apresentação Dia das Mães" style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box" }}/>
          </div>
          {futureEvents.length > 0 && (
            <div style={{ marginBottom:12 }}>
              <label style={{ display:"block", fontSize:10, color:"#666", fontWeight:700, marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Vincular a evento (opcional)</label>
              <select value={form.eventId} onChange={e=>setForm({...form,eventId:e.target.value})} style={{ width:"100%", padding:"10px 12px", borderRadius:6, border:"1px solid #E8E0E0", fontSize:13, outline:"none", boxSizing:"border-box", background:"#fff" }}>
                <option value="">Sem vínculo</option>
                {futureEvents.map(e=><option key={e.id} value={e.id}>{e.title} — {e.date}</option>)}
              </select>
            </div>
          )}
          
          {/* Setlist builder */}
          <div style={{ fontSize:11, fontWeight:700, color:"#666", textTransform:"uppercase", letterSpacing:1, marginBottom:8 }}>Setlist ({form.setlist.length} músicas)</div>
          
          {/* Músicas selecionadas */}
          {form.setlist.length > 0 && (
            <div style={{ marginBottom:12, background:"#fff", border:"1px solid #E8E0E0", borderRadius:6, overflow:"hidden" }}>
              {form.setlist.map((sid,i)=>{
                const s=songMap[sid];
                return (
                  <div key={sid} style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px", borderBottom:"1px solid #f0f0f0", background:i%2===0?"#fff":"#fafafa" }}>
                    <span style={{ fontSize:12, color:"#999", minWidth:20, fontWeight:700 }}>{i+1}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600 }}>{s?.title||"?"}</div>
                      {s?.composer&&<div style={{ fontSize:10, color:"#999" }}>{s.composer}</div>}
                    </div>
                    <div style={{ display:"flex", gap:4 }}>
                      <button onClick={()=>moveUp(i)} disabled={i===0} style={{ background:"none", border:"1px solid #ddd", borderRadius:4, padding:"2px 6px", cursor:"pointer", fontSize:12, color:i===0?"#ddd":"#666" }}>▲</button>
                      <button onClick={()=>moveDown(i)} disabled={i===form.setlist.length-1} style={{ background:"none", border:"1px solid #ddd", borderRadius:4, padding:"2px 6px", cursor:"pointer", fontSize:12, color:i===form.setlist.length-1?"#ddd":"#666" }}>▼</button>
                      <button onClick={()=>removeFromSetlist(sid)} style={{ background:"none", border:"1px solid #ffcdd2", borderRadius:4, padding:"2px 6px", cursor:"pointer", fontSize:12, color:"#B41020" }}>✕</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Adicionar músicas */}
          <div style={{ fontSize:10, color:"#999", textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Adicionar ao setlist:</div>
          <div style={{ maxHeight:200, overflowY:"auto", border:"1px solid #E8E0E0", borderRadius:6, background:"#fff" }}>
            {[...songs].sort((a,b)=>a.title.localeCompare(b.title,"pt-BR")).map(s=>(
              <div key={s.id} onClick={()=>addToSetlist(s.id)} style={{ padding:"8px 12px", borderBottom:"1px solid #f0f0f0", cursor:form.setlist.includes(s.id)?"default":"pointer", background:form.setlist.includes(s.id)?"#f0f0f0":"#fff", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <span style={{ fontSize:13, color:form.setlist.includes(s.id)?"#aaa":"#1A1A1A", fontWeight:500 }}>{s.title}</span>
                  {s.category&&<span style={{ fontSize:10, color:"#999", marginLeft:6 }}>{s.category}</span>}
                </div>
                {form.setlist.includes(s.id) ? <span style={{ fontSize:11, color:"#1B5E20", fontWeight:700 }}>✓</span> : <span style={{ fontSize:18, color:RED }}>+</span>}
              </div>
            ))}
          </div>

          <button onClick={saveApres} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"11px 18px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", fontFamily:"inherit", marginTop:12 }}>Salvar Apresentação</button>
        </div>
      )}

      {apresentacoes.length === 0 && <div style={{ textAlign:"center", color:"#ccc", fontSize:13, padding:"32px 0", fontStyle:"italic" }}>Nenhuma apresentação cadastrada ainda.</div>}

      {[...apresentacoes].sort((a,b)=>a.title.localeCompare(b.title,"pt-BR")).map(apres=>{
        const linkedEvent = events.find(e=>String(e.id)===String(apres.eventId));
        return (
          <div key={apres.id} style={{ background:"#fff", borderRadius:8, border:"1px solid #E8E0E0", marginBottom:12, overflow:"hidden", boxShadow:"0 1px 4px rgba(0,0,0,0.04)" }}>
            <div style={{ padding:"14px 16px" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"#1A1A1A" }}>{apres.title}</div>
                  {linkedEvent && <div style={{ fontSize:11, color:"#666", marginTop:2 }}>📅 {linkedEvent.title} — {linkedEvent.date}</div>}
                  <div style={{ fontSize:11, color:"#999", marginTop:2 }}>{apres.setlist.length} música{apres.setlist.length!==1?"s":""} no setlist</div>
                  <div style={{ marginTop:6, display:"flex", flexWrap:"wrap", gap:4 }}>
                    {apres.setlist.map((sid,i)=>{
                      const s=songMap[sid];
                      return <span key={sid} style={{ fontSize:10, background:"#f5f5f5", border:"1px solid #E8E0E0", borderRadius:4, padding:"2px 6px", color:"#666" }}>{i+1}. {s?.title||"?"}</span>;
                    })}
                  </div>
                </div>
                {isAdmin && (
                  <button onClick={()=>deleteApres(apres.id)} style={{ background:"transparent", color:"#B41020", border:"1px solid #B41020", borderRadius:4, padding:"3px 8px", fontSize:11, cursor:"pointer", marginLeft:8 }}>✕</button>
                )}
              </div>
              <button onClick={()=>openModo(apres)} style={{ background:RED, color:"#fff", border:"none", borderRadius:6, padding:"10px 20px", fontSize:13, fontWeight:700, cursor:"pointer", width:"100%", marginTop:12, fontFamily:"inherit" }}>
                🎵 Abrir Modo Apresentação
              </button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────
function LoginScreen({ members, onLogin }) {
  const [query, setQuery] = useState("");
  const [suggestions, setSuggestions] = useState([]);
  const [adminMode, setAdminMode] = useState(false);
  const [adminPwd, setAdminPwd] = useState("");
  const [error, setError] = useState("");

  useEffect(()=>{ const s=localStorage.getItem("cf_user"); if(s){ try{ onLogin(JSON.parse(s)); }catch{} } },[]);

  function handleQuery(v) { setQuery(v); setSuggestions(v.length>=3?members.filter(m=>m.name.toLowerCase().includes(v.toLowerCase())).slice(0,6):[]); }
  function selectUser(m) { const u={...m,isAdmin:false}; localStorage.setItem("cf_user",JSON.stringify(u)); onLogin(u); }
  function loginAdmin() { if(adminPwd===ADMIN_PASSWORD){ const u={id:0,name:"Administrador",isAdmin:true}; localStorage.setItem("cf_user",JSON.stringify(u)); onLogin(u); } else setError("Senha incorreta."); }

  return (
    <div style={{ minHeight:"100vh", background:C.vermelho, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24 }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet" />
      <div style={{ marginBottom:32, textAlign:"center" }}>
        <div style={{ fontFamily:"'Playfair Display',serif", color:"#fff", fontSize:34, fontWeight:700, letterSpacing:1 }}>Coral Flamboyant</div>
        <div style={{ width:48, height:2, background:C.verde, margin:"12px auto 8px" }} />
        <div style={{ color:"rgba(255,255,255,0.65)", fontSize:11, textTransform:"uppercase", letterSpacing:2 }}>Shopping Flamboyant · Goiânia</div>
      </div>
      <div style={{ background:C.branco, borderRadius:8, padding:28, width:"100%", maxWidth:360, boxShadow:"0 8px 40px rgba(0,0,0,0.25)" }}>
        {!adminMode ? (
          <>
            <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:18, textAlign:"center", textTransform:"uppercase", letterSpacing:0.8 }}>Acesse com seu nome</div>
            <Inp label="Nome" placeholder="Digite pelo menos 3 letras..." value={query} onChange={handleQuery} />
            {suggestions.length>0 && (
              <div style={{ border:`1px solid ${C.borda}`, borderRadius:6, overflow:"hidden", marginTop:-8, marginBottom:12 }}>
                {suggestions.map(m=>(
                  <div key={m.id} onClick={()=>selectUser(m)} style={{ padding:"10px 14px", cursor:"pointer", borderBottom:`1px solid ${C.borda}`, display:"flex", justifyContent:"space-between", alignItems:"center", background:C.branco }}>
                    <div>
                      <span style={{ fontSize:13, fontWeight:600, color:C.texto }}>{m.name}</span>
                      {!m.active && <span style={{ fontSize:10, color:C.textoLeve, marginLeft:6 }}>(inativo)</span>}
                    </div>
                    <span style={{ fontSize:9, color:VOICE_COLORS[m.voice], fontWeight:700, textTransform:"uppercase", letterSpacing:0.5 }}>{VOICE_LABELS[m.voice]}</span>
                  </div>
                ))}
              </div>
            )}
            {query.length>=3&&suggestions.length===0&&<div style={{ color:C.vermelho, fontSize:12, textAlign:"center", marginBottom:12, fontStyle:"italic" }}>Nome não encontrado. Fale com a administração.</div>}
            <button onClick={()=>setAdminMode(true)} style={{ background:"none", border:"none", color:C.textoLeve, fontSize:11, cursor:"pointer", width:"100%", textAlign:"center", marginTop:10, fontFamily:"inherit", textTransform:"uppercase", letterSpacing:0.8 }}>Acesso administrativo</button>
          </>
        ) : (
          <>
            <div style={{ fontSize:12, fontWeight:700, color:C.texto, marginBottom:18, textAlign:"center", textTransform:"uppercase", letterSpacing:0.8 }}>Administração</div>
            <Inp label="Senha" type="password" value={adminPwd} onChange={v=>{ setAdminPwd(v); setError(""); }} />
            {error && <div style={{ color:C.vermelho, fontSize:12, marginBottom:10, textAlign:"center" }}>{error}</div>}
            <button onClick={loginAdmin} style={BTN_RED}>Entrar</button>
            <button onClick={()=>{ setAdminMode(false); setAdminPwd(""); setError(""); }} style={{ background:"none", border:"none", color:C.textoLeve, fontSize:11, cursor:"pointer", width:"100%", textAlign:"center", marginTop:10, fontFamily:"inherit" }}>← Voltar</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── ASSINATURAS ───────────────────────────────────────────────
const PAULO_SIG = "paulo-sig.png";
const LUCIA_SIG = "lucia-sig.png";

// ── APP PRINCIPAL ─────────────────────────────────────────────
function CoralFlamboyant() {
  const [user, setUser] = useState(null);
  const [activeTab, setActiveTab] = useState(0);
  const [members, setMembers] = useState(()=>gs("cf_members",INIT_MEMBERS));
  const [events, setEvents] = useState(()=>gs("cf_events",INIT_EVENTS));
  const [songs, setSongs] = useState(()=>gs("cf_songs",INIT_SONGS));
  const [notices, setNotices] = useState(()=>gs("cf_notices",INIT_NOTICES));
  const [materials, setMaterials] = useState(()=>gs("cf_materials",INIT_MATERIALS));

  useEffect(()=>ss("cf_members",members),[members]);
  useEffect(()=>ss("cf_events",events),[events]);
  useEffect(()=>ss("cf_songs",songs),[songs]);
  useEffect(()=>ss("cf_notices",notices),[notices]);
  useEffect(()=>ss("cf_materials",materials),[materials]);

  useEffect(() => {
    loadFromFirebase([
      ["cf_members", setMembers, INIT_MEMBERS],
      ["cf_events", setEvents, INIT_EVENTS],
      ["cf_songs", setSongs, INIT_SONGS],
      ["cf_notices", setNotices, INIT_NOTICES],
      ["cf_materials", setMaterials, INIT_MATERIALS],
      ["cf_song_cats", setSongCats, INIT_SONG_CATS_FLAMB],
      ["cf_apresentacoes", setApresentacoes, []],
    ]);
  }, []);

  if (!user) return <LoginScreen members={members} onLogin={setUser} />;

  const isAdmin = user.isAdmin;
  const isCorista = !isAdmin;
  const currentMember = isCorista ? members.find(m=>m.id===user.id) : null;

  const tabs = [
    { label:"Agenda", icon:"📅" },
    { label:"Kits", icon:"🎵" },
    { label:"Estudos", icon:"📚" },
    ...(isCorista ? [{ label:"Declaração", icon:"📋" }] : []),
    ...(isAdmin ? [{ label:"Relatório", icon:"📊" }, { label:"Cadastro", icon:"👥" }] : []),
  ];

  return (
    <div style={{ minHeight:"100vh", background:C.fundo, fontFamily:"'Lato',sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet" />
      <div style={{ background:C.vermelho, padding:"14px 20px", display:"flex", justifyContent:"space-between", alignItems:"center", position:"sticky", top:0, zIndex:100, boxShadow:"0 1px 8px rgba(0,0,0,0.15)" }}>
        <div>
          <div style={{ fontFamily:"'Playfair Display',serif", color:"#fff", fontSize:18, fontWeight:700, letterSpacing:0.5 }}>Coral Flamboyant</div>
          <div style={{ color:"rgba(255,255,255,0.65)", fontSize:10, textTransform:"uppercase", letterSpacing:1, marginTop:1 }}>Olá, {user.name.split(" ")[0]}{isAdmin?" · Admin":""}</div>
        </div>
        <button onClick={()=>{ localStorage.removeItem("cf_user"); setUser(null); setActiveTab(0); }} style={{ background:"transparent", border:"1px solid rgba(255,255,255,0.4)", color:"#fff", borderRadius:4, padding:"5px 12px", fontSize:10, cursor:"pointer", fontFamily:"inherit", textTransform:"uppercase", letterSpacing:0.8 }}>Sair</button>
      </div>

      <div style={{ padding:"18px 16px 90px", maxWidth:600, margin:"0 auto" }}>
        <NoticeBar notices={notices} members={members} />
        {activeTab===0 && <AgendaTab events={events} isAdmin={isAdmin} onSave={setEvents} />}
        {activeTab===1 && <KitsTab songs={songs} isAdmin={isAdmin} onSave={setSongs} />}
        {activeTab===2 && <EstudosTab materials={materials} isAdmin={isAdmin} onSave={setMaterials} />}
        {activeTab===3 && isCorista && currentMember && <DeclaracaoTab member={currentMember} events={events} pauloSig={PAULO_SIG} luciaSig={LUCIA_SIG} />}
        {activeTab===3 && isAdmin && <RelatorioTab members={members} events={events} songs={songs} materials={materials} pauloSig={PAULO_SIG} luciaSig={LUCIA_SIG} />}
        {activeTab===4 && isAdmin && <CadastroTab members={members} onSave={setMembers} notices={notices} onSaveNotices={setNotices} />}
      </div>

      <div style={{ position:"fixed", bottom:0, left:0, right:0, background:C.branco, borderTop:`1px solid ${C.borda}`, display:"flex", zIndex:100, boxShadow:"0 -2px 12px rgba(0,0,0,0.06)" }}>
        {tabs.map((tab,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{ flex:1, padding:"10px 0 8px", border:"none", background:"none", cursor:"pointer", color:activeTab===i?C.vermelho:C.textoLeve, borderTop:`2px solid ${activeTab===i?C.vermelho:"transparent"}`, fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:0.5, display:"flex", flexDirection:"column", alignItems:"center", gap:3, fontFamily:"inherit" }}>
            <span style={{ fontSize:18 }}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CoralFlamboyant />);
  </script>
</body>
</html>
