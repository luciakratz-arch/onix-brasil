<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Onix Brasil Vocal Internacional | Portal de Gestão</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.263.1/dist/umd/lucide.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>
    <script src="app.js?v=17"></script>
    <script>
    // ===== Backup dos dados (Firestore) =====
    (function(){
      var COLS=["onix_acessos","onix_avisos","onix_config","onix_confirmacoes","onix_estudos","onix_events","onix_financeiro","onix_frequencias","onix_members","onix_noticias","onix_pagamentos","onix_relatorios_historico","onix_sessoes_checkin","onix_songs"];
      function p2(x){return x<10?"0"+x:""+x;}
      window.fazerBackupCoral=function(){
        var btn=document.getElementById("btnBackupCoral");
        if(btn){btn.disabled=true;btn.textContent="⏳ Gerando...";}
        var bk={geradoEm:new Date().toLocaleString("pt-BR"),coral:"Ônix Brasil Vocal Internacional",colecoes:{}};
        Promise.all(COLS.map(function(c){
          return db.collection(c).get().then(function(snap){
            var docs={};snap.forEach(function(d){docs[d.id]=d.data();});
            bk.colecoes[c]=docs;
          }).catch(function(){bk.colecoes[c]={_erro:"não foi possível ler"};});
        })).then(function(){
          var blob=new Blob([JSON.stringify(bk,null,2)],{type:"application/json"});
          var url=URL.createObjectURL(blob);
          var a=document.createElement("a");
          var h=new Date();
          a.href=url;a.download="backup-onix-"+p2(h.getDate())+p2(h.getMonth()+1)+h.getFullYear()+".json";
          a.click();URL.revokeObjectURL(url);
          if(btn){btn.disabled=false;btn.textContent="💾 Backup";}
        });
      };
      var b=document.createElement("button");
      b.id="btnBackupCoral";b.textContent="💾 Backup";b.title="Baixar backup de todos os dados";
      b.style.cssText="position:fixed;bottom:12px;right:12px;z-index:9999;background:rgba(91,45,142,0.9);color:#fff;border:none;border-radius:18px;padding:7px 14px;font-size:12px;font-family:Inter,sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.25);opacity:0.85;";
      b.onclick=window.fazerBackupCoral;
      document.body.appendChild(b);
    })();
    </script>
</body>
</html>
