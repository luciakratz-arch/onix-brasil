function gs(k,fb) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; } }
function ss(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} }
function fmtDate(d) { if(!d) return ""; const [y,m,dd]=d.split("-"); return `${parseInt(dd)} de ${MONTHS_PT[parseInt(m)-1]} de ${y}`; }
function fmtShort(d) { if(!d) return ""; const [,m,dd]=d.split("-"); return `${parseInt(dd)}/${m}`; }
function fmtBday(d) { if(!d) return ""; const [,m,dd]=d.split("-"); return `${dd}/${m}`; }
function todayStr() { return new Date().toISOString().split("T")[0]; }
function getBdays(members) { const mo=new Date().getMonth()+1; return members.filter(m=>m.active&&m.birthday&&parseInt(m.birthday.split("-")[1])===mo); }
function fmtMoeda(v) { return "R$ " + parseFloat(v||0).toFixed(2).replace(".",","); }

function generatePDF(htmlContent, filename) {
  const full = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${filename}</title>
  <style>* {margin:0;padding:0;box-sizing:border-box;} body{font-family:Arial,sans-serif;color:#1A1A1A;background:#fff;}
  @media print{.no-print{display:none!important;}body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}</style>
  </head><body>
  <div class="no-print" style="background:#4A0080;color:#fff;padding:14px 20px;text-align:center;font-family:Arial;font-size:14px;position:sticky;top:0;">
    📄 Para salvar como PDF: <strong>Ctrl+P → Salvar como PDF</strong>
    <button onclick="window.print()" style="margin-left:12px;background:#D4860A;color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-weight:700;">🖨️ Imprimir / PDF</button>
  </div>
  ${htmlContent}</body></html>`;
  const blob = new Blob([full],{type:"text/html;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const win = window.open(url,"_blank");
  if(!win){ const a=document.createElement("a"); a.href=url; a.download=filename+".html"; document.body.appendChild(a); a.click(); document.body.removeChild(a); }
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

function NoticeBar({notices,members}) {
  const bdays=getBdays(members);
  const last=notices.length?notices[notices.length-1]:null;
  if(!bdays.length&&!last) return null;
  return (
    <div style={{background:C.roxo,borderRadius:8,padding:"14px 18px",marginBottom:20}}>
      {bdays.length>0&&(
        <div style={{marginBottom:last?10:0,paddingBottom:last?10:0,borderBottom:last?"1px solid rgba(255,255,255,0.2)":"none"}}>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>🎂 Aniversariantes de {MONTHS_PT[new Date().getMonth()]}</span>
          <div style={{color:"#fff",fontSize:13,marginTop:3,fontWeight:600}}>{bdays.map(b=>`${b.name.split(" ")[0]} (${fmtBday(b.birthday)})`).join("  ·  ")}</div>
        </div>
      )}
      {last&&(
        <div>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Aviso — {fmtShort(last.date)}</span>
          <div style={{color:"#fff",fontSize:13,marginTop:3,lineHeight:1.5}}>{last.text}</div>
        </div>
      )}
    </div>
  );
}

const EMPTY_FORM={title:"",type:"ensaio",date:"",timeChegada:"",timeApresentacao:"",location:"",vestuario:"",description:"",recurrence:"none",recurrenceDay:3,status:"normal",statusNote:""};

function AgendaTab({events,isAdmin,onSave,currentUser,members}) {
  const now=new Date();
  const [viewMonth,setViewMonth]=useState(now.getMonth());
  const [viewYear,setViewYear]=useState(now.getFullYear());
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [form,setForm]=useState(EMPTY_FORM);
  const [statusEditId,setStatusEditId]=useState(null);
  const [statusForm,setStatusForm]=useState({status:"normal",statusNote:""});
  const [deleteModal,setDeleteModal]=useState(null);
  const today=todayStr();

  function generateOcc(ev,vy,vm) {
    if(ev.recurrence==="none") return [ev];
    const result=[];
    const endDate=new Date(vy,vm+3,0);
    let cur=new Date(ev.date+"T12:00:00");
    let count=0;
    while(cur<=endDate&&count<200) {
      const dateStr=cur.toISOString().split("T")[0];
      if(!ev.exceptions||!ev.exceptions.includes(dateStr))
        result.push({...ev,date:dateStr,id:String(ev.id)+"_"+count,baseId:ev.id,confirmacoes:ev.confirmacoes||{}});
      if(ev.recurrence==="weekly") cur.setDate(cur.getDate()+7);
      else if(ev.recurrence==="biweekly") cur.setDate(cur.getDate()+14);
      else cur.setMonth(cur.getMonth()+1);
      count++;
    }
    return result;
  }

  const monthStr=String(viewYear)+"-"+String(viewMonth+1).padStart(2,"0");
  const allOcc=events.flatMap(ev=>generateOcc(ev,viewYear,viewMonth)).sort((a,b)=>a.date.localeCompare(b.date));
  const monthEvents=allOcc.filter(e=>e.date.startsWith(monthStr));
  const nextEvents=allOcc.filter(e=>e.date>=today).slice(0,3);
  const nextIds=new Set(nextEvents.map(e=>e.id));

  function toggleConfirmacao(ev) {
    const baseId=String(ev.baseId||ev.id);
    const uid=String(currentUser.id);
    const base=events.find(e=>String(e.id)===baseId);
    if(!base) return;
    const confs={...(base.confirmacoes||{})};
    if(confs[uid]) delete confs[uid];
    else confs[uid]={nome:currentUser.name,data:todayStr(),status:"confirmado"};
    onSave(events.map(e=>String(e.id)===baseId?{...e,confirmacoes:confs}:e));
  }

  function submit() {
    if(!form.title||!form.date) return;
    const data={...form,confirmacoes:{}};
    if(editId) onSave(events.map(e=>e.id===editId?{...e,...data}:e));
    else onSave([...events,{...data,id:Date.now()}]);
    setForm(EMPTY_FORM); setShowForm(false); setEditId(null);
  }

  function startEdit(ev) {
    const baseId=String(ev.baseId||ev.id);
    const base=events.find(e=>String(e.id)===baseId);
    if(!base) return;
    setForm({title:base.title,type:base.type||"ensaio",date:base.date,timeChegada:base.timeChegada||"",timeApresentacao:base.timeApresentacao||"",location:base.location||"",vestuario:base.vestuario||"",description:base.description||"",recurrence:base.recurrence||"none",recurrenceDay:base.recurrenceDay??3,status:base.status||"normal",statusNote:base.statusNote||""});
    setEditId(base.id); setShowForm(true);
  }

  function handleDelete(ev) {
    const isRec=ev.recurrence&&ev.recurrence!=="none";
    if(isRec) setDeleteModal(ev);
    else if(window.confirm("Remover este evento?")) onSave(events.filter(e=>String(e.id)!==String(ev.id)));
  }

  function confirmDelete(scope) {
    const ev=deleteModal;
    const baseId=String(ev.baseId||ev.id);
    if(scope==="all") onSave(events.filter(e=>String(e.id)!==baseId));
    else {
      const base=events.find(e=>String(e.id)===baseId);
      if(!base) return;
      const exceptions=[...(base.exceptions||[]),ev.date];
      onSave(events.map(e=>String(e.id)===baseId?{...e,exceptions}:e));
    }
    setDeleteModal(null);
  }

  function saveStatus(ev) {
    const baseId=String(ev.baseId||ev.id);
    onSave(events.map(e=>String(e.id)===baseId?{...e,...statusForm}:e));
    setStatusEditId(null);
  }

  function EventCard({ev,highlight}) {
    const st=EVENT_STATUS.find(s=>s.key===(ev.status||"normal"))||EVENT_STATUS[0];
    const cancelled=ev.status&&ev.status!=="normal";
    const evType=EVENT_TYPES.find(t=>t.key===(ev.type||"ensaio"))||EVENT_TYPES[0];
    const confirma=evType.confirma;
    const uid=String(currentUser?.id||0);
    const jaConfirmou=ev.confirmacoes&&ev.confirmacoes[uid];
    const totalConf=Object.keys(ev.confirmacoes||{}).length;

    return (
      <div style={{...CARD,borderLeft:`3px solid ${cancelled?st.color:highlight?C.laranja:C.roxo}`,background:highlight?"#FBF8FF":C.branco}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span style={{fontSize:14}}>{evType.icon}</span>
              <span style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:cancelled?C.textoLeve:C.texto,textDecoration:cancelled?"line-through":"none"}}>{ev.title}</span>
              {ev.recurrence!=="none"&&<span style={{fontSize:9,color:C.roxo,fontWeight:700,textTransform:"uppercase",border:`1px solid ${C.roxo}`,borderRadius:3,padding:"1px 5px"}}>Recorrente</span>}
              {highlight&&<span style={{fontSize:9,color:C.laranja,fontWeight:700,textTransform:"uppercase",border:`1px solid ${C.laranja}`,borderRadius:3,padding:"1px 5px"}}>Próximo</span>}
            </div>
            <div style={{fontSize:12,color:cancelled?st.color:C.textoSub,marginTop:3,fontWeight:600}}>
              {fmtDate(ev.date)}{cancelled&&<span style={{marginLeft:6}}>— {st.label}</span>}
            </div>
            {!cancelled&&<>
              {ev.timeChegada&&<div style={{fontSize:11,color:C.textoSub,marginTop:2}}>🕐 Chegada: <strong>{ev.timeChegada}</strong></div>}
              {ev.timeApresentacao&&<div style={{fontSize:11,color:C.laranja,marginTop:1}}>🎶 Apresentação: <strong>{ev.timeApresentacao}</strong></div>}
              {ev.location&&<div style={{fontSize:11,color:C.textoLeve,marginTop:2}}>📍 {ev.location}</div>}
              {ev.vestuario&&<div style={{fontSize:11,color:C.textoLeve,marginTop:1}}>👔 {ev.vestuario}</div>}
              {ev.description&&<div style={{fontSize:11,color:C.textoLeve,marginTop:1,fontStyle:"italic"}}>{ev.description}</div>}
            </>}
            {/* Confirmação de presença */}
            {confirma&&!cancelled&&(
              <div style={{marginTop:10,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {!isAdmin&&(
                  <button onClick={()=>toggleConfirmacao(ev)} style={{...BTN_SM(jaConfirmou?C.roxo:C.laranja),padding:"6px 14px",fontSize:12,fontWeight:700,background:jaConfirmou?C.roxo+"18":C.laranja+"18"}}>
                    {jaConfirmou?"✓ Confirmado":"Confirmar presença"}
                  </button>
                )}
                {(isAdmin||jaConfirmou)&&<span style={{fontSize:11,color:C.textoSub}}>{totalConf} confirmado{totalConf!==1?"s":""}</span>}
                {isAdmin&&totalConf>0&&(
                  <div style={{width:"100%",marginTop:4}}>
                    {Object.values(ev.confirmacoes||{}).map((c,i)=>(
                      <span key={i} style={{fontSize:10,background:C.roxo+"15",color:C.roxo,padding:"2px 6px",borderRadius:3,marginRight:4,marginBottom:2,display:"inline-block"}}>{c.nome.split(" ")[0]}</span>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>
          {isAdmin&&(
            <div style={{display:"flex",gap:4,marginLeft:8,flexShrink:0,flexDirection:"column",alignItems:"flex-end"}}>
              <button onClick={()=>{setStatusEditId(statusEditId===ev.id?null:ev.id);setStatusForm({status:ev.status||"normal",statusNote:ev.statusNote||""}); }} style={BTN_SM(st.color)}>Status</button>
              <button onClick={()=>startEdit(ev)} style={BTN_SM("#1565C0")}>✏ Editar</button>
              <button onClick={()=>handleDelete(ev)} style={BTN_SM("#B41020")}>✕ Excluir</button>
            </div>
          )}
        </div>
        {statusEditId===ev.id&&(
          <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${C.borda}`}}>
            <div style={LS}>Alterar status</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {EVENT_STATUS.map(s=>(
                <button key={s.key} onClick={()=>setStatusForm({...statusForm,status:s.key})} style={{padding:"5px 10px",borderRadius:4,border:`1px solid ${statusForm.status===s.key?s.color:C.borda}`,cursor:"pointer",fontSize:11,fontWeight:700,background:statusForm.status===s.key?s.color:"#fff",color:statusForm.status===s.key?"#fff":C.textoSub,fontFamily:"inherit"}}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
            {(statusForm.status==="outros"||statusForm.status==="reagendado")&&<Inp label="Observação" value={statusForm.statusNote} onChange={v=>setStatusForm({...statusForm,statusNote:v})} placeholder="Motivo..." />}
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>saveStatus(ev)} style={{...BTN_P,padding:"8px 14px",fontSize:12}}>Salvar</button>
              <button onClick={()=>setStatusEditId(null)} style={{...BTN_P,background:"#aaa",padding:"8px 14px",fontSize:12}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div>
      {deleteModal&&(
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:999,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div style={{background:"#fff",borderRadius:10,padding:24,maxWidth:320,width:"100%"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,marginBottom:8}}>Excluir evento recorrente</div>
            <div style={{fontSize:13,color:C.textoSub,marginBottom:20,lineHeight:1.5}}><strong>{deleteModal.title}</strong> é recorrente. O que deseja excluir?</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <button onClick={()=>confirmDelete("this")} style={{...BTN_SM("#B41020"),padding:"10px 14px",fontSize:12,textAlign:"left"}}>✕ Somente esta ocorrência ({fmtShort(deleteModal.date)})</button>
              <button onClick={()=>confirmDelete("all")} style={{...BTN_SM(C.roxo),padding:"10px 14px",fontSize:12,textAlign:"left"}}>✕✕ Toda a série</button>
              <button onClick={()=>setDeleteModal(null)} style={{...BTN_SM(C.textoLeve),padding:"10px 14px",fontSize:12,textAlign:"center"}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
      {isAdmin&&(
        <button onClick={()=>{setShowForm(!showForm);setEditId(null);setForm(EMPTY_FORM);}} style={{...BTN_P,marginBottom:18}}>
          {showForm?"Cancelar":"+ Novo Evento"}
        </button>
      )}
      {showForm&&(
        <div style={FORM}>
          <Inp label="Título *" value={form.title} onChange={v=>setForm({...form,title:v})}/>
          <div style={{marginBottom:12}}>
            <label style={LS}>Tipo de evento</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {EVENT_TYPES.map(t=>(
                <button key={t.key} onClick={()=>setForm({...form,type:t.key})} style={{padding:"6px 12px",borderRadius:4,border:`1px solid ${form.type===t.key?C.roxo:C.borda}`,cursor:"pointer",fontSize:12,fontWeight:700,background:form.type===t.key?C.roxo:"#fff",color:form.type===t.key?"#fff":C.textoSub,fontFamily:"inherit"}}>
                  {t.icon} {t.label}
                </button>
              ))}
            </div>
          </div>
          <Inp label="Data *" type="date" value={form.date} onChange={v=>setForm({...form,date:v})}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Inp label="Horário de Chegada" type="time" value={form.timeChegada} onChange={v=>setForm({...form,timeChegada:v})}/>
            <Inp label="Horário da Apresentação" type="time" value={form.timeApresentacao} onChange={v=>setForm({...form,timeApresentacao:v})}/>
          </div>
          <div style={{marginBottom:12}}>
            <label style={LS}>Recorrência</label>
            <select value={form.recurrence} onChange={e=>setForm({...form,recurrence:e.target.value})} style={IS}>
              {RECURRENCE_OPTIONS.map(r=><option key={r.key} value={r.key}>{r.label}</option>)}
            </select>
          </div>
          {form.recurrence!=="none"&&(
            <div style={{marginBottom:12}}>
              <label style={LS}>Dia da semana</label>
              <div style={{display:"flex",gap:4}}>
                {WEEKDAYS.map((d,i)=><button key={i} onClick={()=>setForm({...form,recurrenceDay:i})} style={{flex:1,padding:"7px 0",borderRadius:4,border:`1px solid ${form.recurrenceDay===i?C.roxo:C.borda}`,cursor:"pointer",fontSize:10,fontWeight:700,background:form.recurrenceDay===i?C.roxo:"#fff",color:form.recurrenceDay===i?"#fff":C.textoSub,fontFamily:"inherit"}}>{d}</button>)}
              </div>
            </div>
          )}
          <Inp label="Local" value={form.location} onChange={v=>setForm({...form,location:v})}/>
          <Inp label="Vestuário" value={form.vestuario} onChange={v=>setForm({...form,vestuario:v})} placeholder="Ex: Traje formal preto"/>
          <Inp label="Observações" value={form.description} onChange={v=>setForm({...form,description:v})}/>
          <button onClick={submit} style={BTN_P}>{editId?"Salvar Alterações":"Adicionar Evento"}</button>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);}} style={{background:"none",border:`1px solid ${C.borda}`,borderRadius:4,padding:"5px 10px",cursor:"pointer",fontSize:13,color:C.textoSub}}>‹</button>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:C.texto,textTransform:"capitalize"}}>{MONTHS_PT[viewMonth]} {viewYear}</div>
        <button onClick={()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);}} style={{background:"none",border:`1px solid ${C.borda}`,borderRadius:4,padding:"5px 10px",cursor:"pointer",fontSize:13,color:C.textoSub}}>›</button>
      </div>
      {monthEvents.length===0&&<div style={EMPTY}>Nenhum evento em {MONTHS_PT[viewMonth]}.</div>}
      {monthEvents.map(ev=><EventCard key={ev.id} ev={ev} highlight={nextIds.has(ev.id)}/>)}
    </div>
  );
}

// ── KITS ─────────────────────────────────────────────────────
function AudioPlayer({url,label,icon}) {
  const isPDF=url&&url.toLowerCase().includes("pdf");
  if(isPDF) return <a href={url} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:C.fundo,border:`1px solid ${C.borda}`,borderRadius:6,padding:"9px 12px",color:C.roxo,textDecoration:"none",fontSize:12,fontWeight:700,marginBottom:6}}><span style={{fontSize:16}}>{icon}</span>{label}<span style={{marginLeft:"auto",fontSize:10,color:C.textoLeve}}>Abrir PDF ↗</span></a>;
  let src=url; const dm=url&&url.match(/\/d\/([^/]+)/); if(dm) src=`https://drive.google.com/uc?export=download&id=${dm[1]}`;
  return <div style={{marginBottom:10}}><div style={{fontSize:10,color:C.roxo,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>{icon} {label}</div><audio controls style={{width:"100%",height:34}} src={src}/></div>;
}

function SongCard({song,isAdmin,onUpdate,onDelete}) {
  const [open,setOpen]=useState(false);
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({title:song.title,composer:song.composer||"",curiosidades:song.curiosidades||"",files:{...song.files}});
  const hasFiles=Object.values(song.files).some(v=>v&&v.trim());
  return (
    <div style={{...CARD,padding:0,overflow:"hidden"}}>
      <div onClick={()=>!editing&&setOpen(!open)} style={{padding:"14px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:open?C.fundo:C.branco}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:C.texto}}>{song.title}</div>
          {song.composer&&<div style={{fontSize:11,color:C.textoSub,marginTop:2,fontStyle:"italic"}}>{song.composer}</div>}
          <div style={{fontSize:10,color:hasFiles?C.laranja:C.textoLeve,marginTop:4,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5}}>{hasFiles?"● Arquivos disponíveis":"○ Sem arquivos"}</div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center"}}>
          {isAdmin&&<><button onClick={e=>{e.stopPropagation();setEditing(!editing);setOpen(true);}} style={BTN_SM("#1565C0")}>✏</button><button onClick={e=>{e.stopPropagation();if(window.confirm("Remover?"))onDelete(song.id);}} style={BTN_SM("#B41020")}>✕</button></>}
          <span style={{fontSize:12,color:C.textoLeve,marginLeft:4}}>{open?"▲":"▼"}</span>
        </div>
      </div>
      {open&&(
        <div style={{padding:"0 16px 16px",borderTop:`1px solid ${C.borda}`}}>
          {editing?(
            <div style={{paddingTop:14}}>
              <Inp label="Título" value={form.title} onChange={v=>setForm({...form,title:v})}/>
              <Inp label="Compositor" value={form.composer} onChange={v=>setForm({...form,composer:v})}/>
              <div style={{marginBottom:12}}><label style={LS}>Curiosidades</label><textarea value={form.curiosidades} onChange={e=>setForm({...form,curiosidades:e.target.value})} style={{...IS,height:72,resize:"vertical"}}/></div>
              <div style={{borderTop:`1px solid ${C.borda}`,paddingTop:12,marginBottom:8}}/>
              <div style={{fontSize:10,color:C.textoSub,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Links do Google Drive</div>
              {FILE_FIELDS.map(f=><Inp key={f.key} label={f.label} placeholder="Cole o link aqui" value={form.files[f.key]||""} onChange={v=>setForm({...form,files:{...form.files,[f.key]:v}})}/>)}
              <div style={{display:"flex",gap:8}}><button onClick={()=>{onUpdate({...song,...form});setEditing(false);}} style={BTN_P}>Salvar</button><button onClick={()=>setEditing(false)} style={{...BTN_P,background:"#999"}}>Cancelar</button></div>
            </div>
          ):(
            <div style={{paddingTop:14}}>
              {song.curiosidades&&<div style={{borderLeft:`3px solid ${C.laranja}`,paddingLeft:12,marginBottom:16}}><div style={{fontSize:10,color:C.laranja,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>Sobre esta música</div><div style={{fontSize:13,color:C.texto,lineHeight:1.6,fontStyle:"italic"}}>{song.curiosidades}</div></div>}
              {!hasFiles&&<div style={EMPTY}>Nenhum arquivo disponível ainda.</div>}
              {FILE_FIELDS.map(f=>{const url=song.files[f.key];if(!url||!url.trim())return null;return <AudioPlayer key={f.key} url={url} label={f.label} icon={f.icon}/>;})}</div>
          )}
        </div>
      )}
    </div>
  );
}

function KitsTab({songs,isAdmin,onSave}) {
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({title:"",composer:""});
  function addSong(){if(!form.title)return;const files={};FILE_FIELDS.forEach(f=>files[f.key]="");onSave([...songs,{id:Date.now(),...form,curiosidades:"",files}]);setForm({title:"",composer:""});setShowForm(false);}
  return <div>{isAdmin&&<button onClick={()=>setShowForm(!showForm)} style={{...BTN_P,marginBottom:18}}>{showForm?"Cancelar":"+ Nova Música"}</button>}{showForm&&<div style={FORM}><Inp label="Título *" value={form.title} onChange={v=>setForm({...form,title:v})}/><Inp label="Compositor" value={form.composer} onChange={v=>setForm({...form,composer:v})}/><button onClick={addSong} style={BTN_P}>Adicionar</button></div>}{songs.length===0&&<div style={EMPTY}>Nenhuma música no repertório ainda.</div>}{songs.map(s=><SongCard key={s.id} song={s} isAdmin={isAdmin} onUpdate={u=>onSave(songs.map(x=>x.id===s.id?u:x))} onDelete={id=>onSave(songs.filter(x=>x.id!==id))}/>)}</div>;
}

function EstudosTab({materials,isAdmin,onSave}) {
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({title:"",url:"",category:"tecnica",description:""});
  const [editId,setEditId]=useState(null);
  const [filterCat,setFilterCat]=useState("todos");
  function submit(){if(!form.title||!form.url)return;if(editId)onSave(materials.map(m=>m.id===editId?{...m,...form}:m));else onSave([...materials,{...form,id:Date.now()}]);setForm({title:"",url:"",category:"tecnica",description:""});setShowForm(false);setEditId(null);}
  const filtered=filterCat==="todos"?materials:materials.filter(m=>m.category===filterCat);
  return (
    <div>
      {isAdmin&&<button onClick={()=>{setShowForm(!showForm);setEditId(null);setForm({title:"",url:"",category:"tecnica",description:""}); }} style={{...BTN_P,marginBottom:18}}>{showForm?"Cancelar":"+ Novo Material"}</button>}
      {showForm&&<div style={FORM}><Inp label="Título *" value={form.title} onChange={v=>setForm({...form,title:v})}/><Inp label="Link *" value={form.url} onChange={v=>setForm({...form,url:v})} placeholder="https://youtube.com/..."/><div style={{marginBottom:12}}><label style={LS}>Categoria</label><select value={form.category} onChange={e=>setForm({...form,category:e.target.value})} style={IS}>{STUDY_CATEGORIES.map(c=><option key={c.key} value={c.key}>{c.label}</option>)}</select></div><Inp label="Descrição" value={form.description} onChange={v=>setForm({...form,description:v})}/><button onClick={submit} style={BTN_P}>{editId?"Salvar":"Adicionar"}</button></div>}
      <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:8,marginBottom:16}}>
        {[{key:"todos",label:"Todos",color:C.texto},...STUDY_CATEGORIES].map(c=><button key={c.key} onClick={()=>setFilterCat(c.key)} style={{flexShrink:0,padding:"5px 12px",borderRadius:4,border:`1px solid ${filterCat===c.key?c.color:C.borda}`,cursor:"pointer",fontSize:11,fontWeight:700,background:filterCat===c.key?c.color:"#fff",color:filterCat===c.key?"#fff":C.textoSub,fontFamily:"inherit"}}>{c.label}</button>)}
      </div>
      {filtered.length===0&&<div style={EMPTY}>Nenhum material disponível.</div>}
      {filtered.map(mat=>{const cat=STUDY_CATEGORIES.find(c=>c.key===mat.category)||STUDY_CATEGORIES[4];const isYT=mat.url.includes("youtube")||mat.url.includes("youtu.be");return(
        <div key={mat.id} style={{...CARD,borderLeft:`3px solid ${cat.color}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{flex:1}}><div style={{fontSize:9,color:cat.color,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>{cat.label}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:C.texto}}>{mat.title}</div>{mat.description&&<div style={{fontSize:12,color:C.textoSub,marginTop:4,fontStyle:"italic"}}>{mat.description}</div>}</div>
            {isAdmin&&<div style={{display:"flex",gap:4,marginLeft:8}}><button onClick={()=>{setForm({title:mat.title,url:mat.url,category:mat.category,description:mat.description||""});setEditId(mat.id);setShowForm(true);}} style={BTN_SM("#1565C0")}>✏</button><button onClick={()=>{if(window.confirm("Remover?"))onSave(materials.filter(x=>x.id!==mat.id));}} style={BTN_SM("#B41020")}>✕</button></div>}

// ── FINANCEIRO ────────────────────────────────────────────────
function FinanceiroTab({financeiro,onSave,members}) {
  const [section,setSection]=useState("resumo");
  const [form,setForm]=useState({tipo:"receita",descricao:"",valor:"",data:todayStr(),categoria:""});
  const [showForm,setShowForm]=useState(false);
  const [taxaEdit,setTaxaEdit]=useState(false);
  const [novaTaxa,setNovaTaxa]=useState(String(financeiro.taxa));
  const [mesTaxa,setMesTaxa]=useState(todayStr().slice(0,7));

  const receitas=financeiro.receitas||[];
  const despesas=financeiro.despesas||[];
  const totalReceitas=receitas.reduce((s,r)=>s+parseFloat(r.valor||0),0);
  const totalDespesas=despesas.reduce((s,d)=>s+parseFloat(d.valor||0),0);
  const saldo=totalReceitas-totalDespesas;

  // Taxa mensal
  const membrosAtivos=members.filter(m=>m.active);
  const taxasPagas=financeiro.taxasPagas||{};
  const mesTaxaKey=mesTaxa;
  const pagosNoMes=taxasPagas[mesTaxaKey]||{};

  function toggleTaxa(memberId) {
    const key=String(memberId);
    const novoMes={...pagosNoMes};
    if(novoMes[key]) delete novoMes[key];
    else novoMes[key]={data:todayStr()};
    onSave({...financeiro,taxasPagas:{...taxasPagas,[mesTaxaKey]:novoMes}});
  }

  function addLancamento(){
    if(!form.descricao||!form.valor) return;
    if(form.tipo==="receita") onSave({...financeiro,receitas:[...receitas,{...form,id:Date.now()}]});
    else onSave({...financeiro,despesas:[...despesas,{...form,id:Date.now()}]});
    setForm({tipo:"receita",descricao:"",valor:"",data:todayStr(),categoria:""});setShowForm(false);
  }

  const sections=["resumo","lancamentos","taxa"];

  return (
    <div>
      <div style={{display:"flex",gap:0,marginBottom:20,border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden"}}>
        {sections.map(s=><button key={s} onClick={()=>setSection(s)} style={{flex:1,padding:"10px",border:"none",cursor:"pointer",fontFamily:"inherit",background:section===s?C.roxo:C.branco,color:section===s?"#fff":C.textoSub,fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:0.5}}>
          {s==="resumo"?"Resumo":s==="lancamentos"?"Lançamentos":"Taxa Mensal"}
        </button>)}
      </div>

      {section==="resumo"&&(
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            <div style={{...CARD,textAlign:"center",borderTop:`3px solid #1B5E20`}}><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Receitas</div><div style={{fontSize:24,fontWeight:700,color:"#1B5E20",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(totalReceitas)}</div></div>
            <div style={{...CARD,textAlign:"center",borderTop:"3px solid #B41020"}}><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Despesas</div><div style={{fontSize:24,fontWeight:700,color:"#B41020",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(totalDespesas)}</div></div>
          </div>
          <div style={{...CARD,textAlign:"center",borderTop:`3px solid ${saldo>=0?C.roxo:C.laranja}`}}>
            <div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:4}}>Saldo</div>
            <div style={{fontSize:32,fontWeight:700,color:saldo>=0?C.roxo:"#B41020",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(saldo)}</div>
          </div>
          {/* Últimos lançamentos */}
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,margin:"16px 0 8px"}}>Últimos lançamentos</div>
          {[...receitas.map(r=>({...r,tipo:"receita"})),...despesas.map(d=>({...d,tipo:"despesa"}))].sort((a,b)=>b.data?.localeCompare(a.data||"")||0).slice(0,5).map(l=>(
            <div key={l.id} style={{...CARD,padding:"10px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600,color:C.texto}}>{l.descricao}</div><div style={{fontSize:10,color:C.textoLeve,marginTop:2}}>{fmtDate(l.data)}{l.categoria?` · ${l.categoria}`:""}</div></div>
                <div style={{fontSize:14,fontWeight:700,color:l.tipo==="receita"?"#1B5E20":"#B41020"}}>{l.tipo==="receita"?"+":"-"}{fmtMoeda(l.valor)}</div>
              </div>
            </div>
          ))}
          {receitas.length===0&&despesas.length===0&&<div style={EMPTY}>Nenhum lançamento ainda.</div>}
        </div>
      )}

      {section==="lancamentos"&&(
        <div>
          <button onClick={()=>setShowForm(!showForm)} style={{...BTN_P,marginBottom:18}}>{showForm?"Cancelar":"+ Novo Lançamento"}</button>
          {showForm&&(
            <div style={FORM}>
              <div style={{display:"flex",gap:0,marginBottom:12,border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden"}}>
                {["receita","despesa"].map(t=><button key={t} onClick={()=>setForm({...form,tipo:t})} style={{flex:1,padding:"9px",border:"none",cursor:"pointer",fontFamily:"inherit",background:form.tipo===t?(t==="receita"?"#1B5E20":"#B41020"):C.branco,color:form.tipo===t?"#fff":C.textoSub,fontWeight:700,fontSize:12}}>{t==="receita"?"+ Receita":"− Despesa"}</button>)}
              </div>
              <Inp label="Descrição *" value={form.descricao} onChange={v=>setForm({...form,descricao:v})} placeholder="Ex: Campanha de rifa, Viagem..."/>
              <Inp label="Valor (R$) *" type="number" value={form.valor} onChange={v=>setForm({...form,valor:v})} placeholder="0,00"/>
              <Inp label="Data" type="date" value={form.data} onChange={v=>setForm({...form,data:v})}/>
              <Inp label="Categoria" value={form.categoria} onChange={v=>setForm({...form,categoria:v})} placeholder="Ex: Viagem, Figurino, Rifa..."/>
              <button onClick={addLancamento} style={BTN_P}>Adicionar</button>
            </div>
          )}
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Receitas</div>
          {receitas.length===0&&<div style={EMPTY}>Nenhuma receita ainda.</div>}
          {receitas.map(r=>(
            <div key={r.id} style={{...CARD,padding:"10px 14px",borderLeft:"3px solid #1B5E20"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600,color:C.texto}}>{r.descricao}</div><div style={{fontSize:10,color:C.textoLeve,marginTop:2}}>{fmtDate(r.data)}{r.categoria?` · ${r.categoria}`:""}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:700,color:"#1B5E20"}}>+{fmtMoeda(r.valor)}</span><button onClick={()=>{if(window.confirm("Remover?"))onSave({...financeiro,receitas:receitas.filter(x=>x.id!==r.id)});}} style={BTN_SM("#B41020")}>✕</button></div>
              </div>
            </div>
          ))}
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,margin:"16px 0 8px"}}>Despesas</div>
          {despesas.length===0&&<div style={EMPTY}>Nenhuma despesa ainda.</div>}
          {despesas.map(d=>(
            <div key={d.id} style={{...CARD,padding:"10px 14px",borderLeft:"3px solid #B41020"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:13,fontWeight:600,color:C.texto}}>{d.descricao}</div><div style={{fontSize:10,color:C.textoLeve,marginTop:2}}>{fmtDate(d.data)}{d.categoria?` · ${d.categoria}`:""}</div></div>
                <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:14,fontWeight:700,color:"#B41020"}}>-{fmtMoeda(d.valor)}</span><button onClick={()=>{if(window.confirm("Remover?"))onSave({...financeiro,despesas:despesas.filter(x=>x.id!==d.id)});}} style={BTN_SM("#B41020")}>✕</button></div>
              </div>
            </div>
          ))}
        </div>
      )}

      {section==="taxa"&&(
        <div>
          <div style={{...CARD,marginBottom:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8}}>Taxa Mensal</div><div style={{fontSize:22,fontWeight:700,color:C.roxo,fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(financeiro.taxa)}</div></div>
              <button onClick={()=>setTaxaEdit(!taxaEdit)} style={BTN_SM(C.laranja)}>✏ Editar</button>
            </div>
            {taxaEdit&&<div style={{marginTop:12,display:"flex",gap:8}}><input type="number" value={novaTaxa} onChange={e=>setNovaTaxa(e.target.value)} style={{...IS,flex:1}}/><button onClick={()=>{onSave({...financeiro,taxa:parseFloat(novaTaxa)||0});setTaxaEdit(false);}} style={{...BTN_P,width:"auto",padding:"10px 18px"}}>Salvar</button></div>}
          </div>
          <div style={{marginBottom:14}}>
            <label style={LS}>Mês de referência</label>
            <input type="month" value={mesTaxa} onChange={e=>setMesTaxa(e.target.value)} style={IS}/>
          </div>
          <div style={{fontSize:11,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>
            Pagamentos — {Object.keys(pagosNoMes).length}/{membrosAtivos.length} pagos
          </div>
          {membrosAtivos.map(m=>{
            const pago=pagosNoMes[String(m.id)];
            return(
              <div key={m.id} style={{...CARD,padding:"10px 14px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,color:C.texto}}>{m.name}</div>
                    <div style={{fontSize:10,color:pago?"#1B5E20":C.textoLeve,marginTop:2}}>{pago?`✓ Pago em ${fmtDate(pago.data)}`:"Pendente"}</div>
                  </div>
                  <button onClick={()=>toggleTaxa(m.id)} style={{...BTN_SM(pago?"#1B5E20":C.laranja),padding:"6px 12px"}}>{pago?"✓ Pago":"Marcar pago"}</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── DECLARAÇÃO ────────────────────────────────────────────────
function DeclaracaoTab({member,isAdmin,members,events,pauloSig,luciaSig}) {
  const today=todayStr();
  const [selectedMemberId,setSelectedMemberId]=useState(isAdmin?-1:member.id);
  const [funcao,setFuncao]=useState(isAdmin?"produtora":"corista");
  
  const selectedMember = isAdmin 
    ? (selectedMemberId===-1 ? {id:-1,name:"Lucia Kratz",voice:"soprano",startDate:"2026-01-01",endDate:""} 
       : selectedMemberId===-2 ? {id:-2,name:"Paulo Sergio Motta",voice:"tenor",startDate:"2026-01-01",endDate:""}
       : members.find(m=>m.id===selectedMemberId)||member)
    : member;
  
  const startDate=selectedMember.startDate||today;
  const endDate=selectedMember.endDate||today;
  const apresentacoes=events.filter(e=>e.date>=startDate&&e.date<=endDate&&(e.status||"normal")==="normal"&&e.recurrence==="none"&&e.type!=="ensaio");

  const FUNCOES=[
    {key:"corista",label:"Corista"},
    {key:"maestro",label:"Maestro"},
    {key:"produtora",label:"Produtora"},
    {key:"regente",label:"Regente"},
    {key:"outro",label:"Outro participante"},
  ];

  function gerarDeclaracao(){
    const [sy,sm,sd]=startDate.split("-");
    const [ey,em,ed]=endDate.split("-");
    const periodo=startDate===endDate?fmtDate(startDate):`${parseInt(sd)} de ${MONTHS_PT[parseInt(sm)-1]} de ${sy} a ${parseInt(ed)} de ${MONTHS_PT[parseInt(em)-1]} de ${ey}`;
    const funcaoLabel=FUNCOES.find(f=>f.key===funcao)?.label||"Participante";
    const html=`<div style="max-width:700px;margin:0 auto;">
      <div style="background:#4A0080;padding:24px 40px 18px;color:#fff;">
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;">Ônix Brasil Vocal Internacional</div>
        <div style="font-size:10px;margin-top:4px;opacity:0.8;text-transform:uppercase;letter-spacing:2px;">Goiânia, GO</div>
      </div>
      <div style="background:#D4860A;height:5px;"></div>
      <div style="padding:40px 40px 32px;">
        <div style="text-align:center;margin-bottom:32px;">
          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:2px;">Declaração de Participação</div>
          <div style="width:60px;height:2px;background:#D4860A;margin:10px auto;"></div>
        </div>
        <p style="font-size:13px;line-height:2;color:#333;text-align:justify;">Declaramos que <strong>${selectedMember.name}</strong>, na função de <strong>${funcaoLabel}</strong> do Ônix Brasil Vocal Internacional${funcao==="corista"?`, categoria <strong>${VOICE_LABELS[selectedMember.voice]||""}</strong>,`:","} integrou ativamente as atividades do grupo no período de <strong>${periodo}</strong>.</p>
        ${apresentacoes.length>0?`<div style="margin-top:24px;"><div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#4A0080;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;border-bottom:1px solid #4A0080;padding-bottom:5px;display:inline-block;">Apresentações no Período</div><ul style="margin-top:10px;padding-left:20px;">${apresentacoes.map(e=>`<li style="font-size:12px;color:#333;margin-bottom:4px;">${fmtDate(e.date)} — ${e.title}${e.location?" · "+e.location:""}</li>`).join("")}</ul></div>`:""}
        <p style="font-size:13px;margin-top:24px;">Goiânia, ${fmtDate(today)}.</p>
        <div style="margin-top:48px;display:flex;justify-content:space-around;gap:40px;">
          <div style="text-align:center;flex:1;">${pauloSig?`<img src="${pauloSig}" style="height:55px;object-fit:contain;display:block;margin:0 auto 4px;"/>`:"<div style='height:55px;border-bottom:1px solid #333;'></div>"}<div style="font-size:11px;font-weight:700;margin-top:4px;">Paulo Sergio Motta</div><div style="font-size:10px;color:#666;">Maestro</div></div>
          <div style="text-align:center;flex:1;">${luciaSig?`<img src="${luciaSig}" style="height:55px;object-fit:contain;display:block;margin:0 auto 4px;"/>`:"<div style='height:55px;border-bottom:1px solid #333;'></div>"}<div style="font-size:11px;font-weight:700;margin-top:4px;">Lucia Kratz</div><div style="font-size:10px;color:#666;">Produtora</div></div>
        </div>
      </div>
    </div>`;
    generatePDF(html,`Declaracao_Onix_${selectedMember.name.replace(/ /g,"_")}`);
  }

  const pessoasAdmin=[
    {id:-1,name:"Lucia Kratz",role:"Produtora"},
    {id:-2,name:"Paulo Sergio Motta",role:"Maestro"},
    ...members.map(m=>({id:m.id,name:m.name,role:VOICE_LABELS[m.voice]})),
  ];

  return (
    <div>
      <div style={{background:C.roxo,borderRadius:8,padding:"16px 18px",marginBottom:20,color:"#fff"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700}}>{selectedMember.name}</div>
        <div style={{fontSize:11,marginTop:3,opacity:0.85,textTransform:"uppercase",letterSpacing:0.8}}>Declaração de Participação</div>
      </div>
      
      {isAdmin&&(
        <div style={FORM}>
          <div style={{marginBottom:12}}>
            <label style={LS}>Pessoa</label>
            <select value={selectedMemberId} onChange={e=>setSelectedMemberId(parseInt(e.target.value))} style={IS}>
              {pessoasAdmin.map(p=><option key={p.id} value={p.id}>{p.name} — {p.role}</option>)}
            </select>
          </div>
          <div style={{marginBottom:0}}>
            <label style={LS}>Função na declaração</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {FUNCOES.map(f=><button key={f.key} onClick={()=>setFuncao(f.key)} style={{padding:"6px 12px",borderRadius:4,border:`1px solid ${funcao===f.key?C.roxo:C.borda}`,cursor:"pointer",fontSize:12,fontWeight:700,background:funcao===f.key?C.roxo:"#fff",color:funcao===f.key?"#fff":C.textoSub,fontFamily:"inherit"}}>{f.label}</button>)}
            </div>
          </div>
        </div>
      )}

      <div style={CARD}>
        <div style={{fontSize:12,color:C.textoSub,marginBottom:6}}>Período de participação:</div>
        <div style={{fontSize:14,fontWeight:700,color:C.texto}}>{fmtDate(startDate)} {selectedMember.endDate?`a ${fmtDate(selectedMember.endDate)}`:"até o momento"}</div>
        {apresentacoes.length>0&&<div style={{marginTop:12}}><div style={{fontSize:11,color:C.textoSub,textTransform:"uppercase",letterSpacing:0.8,marginBottom:8}}>Apresentações ({apresentacoes.length})</div>{apresentacoes.map(e=><div key={e.id} style={{fontSize:12,color:C.texto,padding:"4px 0",borderBottom:`1px solid ${C.borda}`}}>{fmtShort(e.date)} — {e.title}</div>)}</div>}
      </div>
      <button onClick={gerarDeclaracao} style={BTN_O}>⬇ Baixar Declaração em PDF</button>
    </div>
  );
}

                </div>
                <div style={{display:"flex",gap:4,flexDirection:"column",alignItems:"flex-end"}}>
                  <button onClick={()=>{setForm({name:m.name,voice:m.voice,birthday:m.birthday||"",whatsapp:m.whatsapp||"",active:m.active,startDate:m.startDate||"",endDate:m.endDate||""});setEditId(m.id);setShowForm(true);}} style={BTN_SM("#1565C0")}>✏</button>
                  <button onClick={()=>onSave(members.map(x=>x.id===m.id?{...x,active:false,endDate:todayStr()}:x))} style={BTN_SM(C.laranja)}>Desativar</button>
                </div>
              </div>
            </div>
          ))}
          {inactive.length>0&&<><div style={{fontSize:10,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1.5,margin:"16px 0 10px"}}>Histórico — Inativos ({inactive.length})</div>{inactive.map(m=><div key={m.id} style={{...CARD,opacity:0.65}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontWeight:600,fontSize:13,color:C.textoSub}}>{m.name}</div><div style={{fontSize:10,color:C.textoLeve}}>{VOICE_LABELS[m.voice]} · Saída: {fmtDate(m.endDate)}</div></div><button onClick={()=>onSave(members.map(x=>x.id===m.id?{...x,active:true,endDate:""}:x))} style={BTN_SM(C.roxo)}>Reativar</button></div></div>)}</>}
        </>
      )}
      {section==="notices"&&(
        <><div style={FORM}><label style={LS}>Novo Aviso</label><textarea value={noticeText} onChange={e=>setNoticeText(e.target.value)} placeholder="Digite o aviso..." style={{...IS,height:80,resize:"vertical"}}/><button onClick={()=>{if(!noticeText.trim())return;onSaveNotices([...notices,{id:Date.now(),text:noticeText,date:todayStr(),author:"Administração"}]);setNoticeText("");}} style={{...BTN_P,marginTop:10}}>Publicar</button></div>
        {[...notices].reverse().map(n=><div key={n.id} style={CARD}><div style={{fontSize:10,color:C.roxo,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,marginBottom:5}}>{n.author} · {fmtShort(n.date)}</div><div style={{fontSize:13,color:C.texto,lineHeight:1.5}}>{n.text}</div><button onClick={()=>{if(window.confirm("Remover?"))onSaveNotices(notices.filter(x=>x.id!==n.id));}} style={{...BTN_SM("#B41020"),marginTop:10}}>Remover</button></div>)}</>
      )}
    </div>
  );
}


// ── RELATÓRIO ─────────────────────────────────────────────────
function RelatorioTab({members,events,songs,materials,financeiro,pauloSig,luciaSig}) {
  const today = todayStr();
  const now = new Date();
  const [mesInicio,setMesInicio] = useState(String(now.getFullYear())+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const [mesFim,setMesFim] = useState(String(now.getFullYear())+"-"+String(now.getMonth()+1).padStart(2,"0"));
  const [textoIntro,setTextoIntro] = useState("");
  const [linkVideo,setLinkVideo] = useState("");
  const [linkFotos,setLinkFotos] = useState("");

  const active = members.filter(m=>m.active);
  const inactive = members.filter(m=>!m.active);
  const byVoice = Object.keys(VOICE_LABELS).map(v=>({voice:v,count:active.filter(m=>m.voice===v).length}));
  const maxVoice = Math.max(...byVoice.map(v=>v.count),1);
  const bdays = getBdays(members);

  function getEventsInPeriod() {
    const start = mesInicio+"-01";
    const endDate = new Date(mesFim.split("-")[0],parseInt(mesFim.split("-")[1]),0);
    const end = endDate.toISOString().split("T")[0];
    return events.filter(e=>e.date>=start&&e.date<=end&&(e.status||"normal")==="normal");
  }

  const eventosRealizados = getEventsInPeriod();
  const ensaios = eventosRealizados.filter(e=>e.type==="ensaio"||e.recurrence!=="none");
  const apresentacoes = eventosRealizados.filter(e=>e.type!=="ensaio"&&e.recurrence==="none");
  const viagens = eventosRealizados.filter(e=>e.type==="viagem");

  const receitas = (financeiro.receitas||[]);
  const despesas = (financeiro.despesas||[]);
  const totalReceitas = receitas.reduce((s,r)=>s+parseFloat(r.valor||0),0);
  const totalDespesas = despesas.reduce((s,d)=>s+parseFloat(d.valor||0),0);

  function periodoLabel() {
    if(mesInicio===mesFim){const[y,m]=mesInicio.split("-");return `${MONTHS_PT[parseInt(m)-1]} de ${y}`;}
    const[y1,m1]=mesInicio.split("-");const[y2,m2]=mesFim.split("-");
    return `${MONTHS_PT[parseInt(m1)-1]} de ${y1} a ${MONTHS_PT[parseInt(m2)-1]} de ${y2}`;
  }

  function gerarRelatorio() {
    const html = `
    <div style="max-width:750px;margin:0 auto;padding:0;">
      <div style="background:#4A0080;padding:28px 40px 20px;color:#fff;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div>
            <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;">Ônix Brasil Vocal Internacional</div>
            <div style="font-size:11px;margin-top:6px;opacity:0.8;text-transform:uppercase;letter-spacing:2px;">Goiânia, GO</div>
          </div>
          <div style="text-align:right;font-size:11px;opacity:0.8;">
            <div>Maestro: Paulo Sergio Motta</div>
            <div style="margin-top:3px;">Produtora: Lucia Kratz</div>
          </div>
        </div>
        <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.3);padding-top:12px;display:flex;gap:20px;font-size:11px;opacity:0.85;">
          <span>Relatório de Atividades</span><span>·</span>
          <span style="text-transform:capitalize;">${periodoLabel()}</span><span>·</span>
          <span>Emitido em: ${fmtDate(today)}</span>
        </div>
      </div>
      <div style="background:#D4860A;height:6px;"></div>
      <div style="padding:32px 40px;">
        ${textoIntro?`<div style="margin-bottom:28px;"><div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#4A0080;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;border-bottom:2px solid #4A0080;padding-bottom:6px;display:inline-block;">Apresentação</div><p style="font-size:13px;line-height:1.8;color:#333;margin-top:10px;">${textoIntro}</p></div>`:""}
        <div style="margin-bottom:28px;">
          <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#4A0080;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;border-bottom:2px solid #4A0080;padding-bottom:6px;display:inline-block;">Resumo do Período</div>
          <table style="width:100%;border-collapse:collapse;margin-top:10px;">
            <tr style="background:#f9f9f9;"><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;font-weight:700;">Coristas Ativos</td><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;text-align:center;">${active.length}</td></tr>
            <tr><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;font-weight:700;">Ensaios Realizados</td><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;text-align:center;">${ensaios.length}</td></tr>
            <tr style="background:#f9f9f9;"><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;font-weight:700;">Apresentações</td><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;text-align:center;">${apresentacoes.length}</td></tr>
            <tr><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;font-weight:700;">Viagens</td><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;text-align:center;">${viagens.length}</td></tr>
            <tr style="background:#f9f9f9;"><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;font-weight:700;">Músicas no Repertório</td><td style="padding:10px 14px;font-size:13px;border:1px solid #eee;text-align:center;">${songs.length}</td></tr>

        </div>
        ${eventosRealizados.length>0?`
        <div style="margin-bottom:28px;">
          <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#4A0080;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;border-bottom:2px solid #4A0080;padding-bottom:6px;display:inline-block;">Atividades Realizadas</div>
          <table style="width:100%;border-collapse:collapse;margin-top:10px;">
            <tr style="background:#4A0080;color:#fff;">
              <th style="padding:8px 12px;font-size:11px;text-align:left;font-weight:700;text-transform:uppercase;">Data</th>
              <th style="padding:8px 12px;font-size:11px;text-align:left;font-weight:700;text-transform:uppercase;">Atividade</th>
              <th style="padding:8px 12px;font-size:11px;text-align:left;font-weight:700;text-transform:uppercase;">Local</th>
            </tr>
            ${eventosRealizados.map((e,i)=>`<tr style="background:${i%2===0?"#f9f9f9":"#fff"};"><td style="padding:8px 12px;font-size:12px;border:1px solid #eee;">${fmtDate(e.date)}</td><td style="padding:8px 12px;font-size:12px;border:1px solid #eee;font-weight:600;">${e.title}</td><td style="padding:8px 12px;font-size:12px;border:1px solid #eee;color:#666;">${e.location||"—"}</td></tr>`).join("")}
          </table>
        </div>`:""}
        ${(linkVideo||linkFotos)?`<div style="margin-bottom:28px;"><div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#4A0080;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;border-bottom:2px solid #4A0080;padding-bottom:6px;display:inline-block;">Registros</div>${linkVideo?`<p style="font-size:12px;margin-top:10px;"><strong>Vídeo:</strong> <span style="color:#1565C0;">${linkVideo}</span></p>`:""}${linkFotos?`<p style="font-size:12px;margin-top:6px;"><strong>Fotos:</strong> <span style="color:#1565C0;">${linkFotos}</span></p>`:""}</div>`:""}
        <div style="margin-top:48px;display:flex;justify-content:space-around;gap:40px;">
          <div style="text-align:center;flex:1;">${pauloSig?`<img src="${pauloSig}" style="height:60px;object-fit:contain;display:block;margin:0 auto 4px;"/>`:"<div style='height:60px;border-bottom:1px solid #333;'></div>"}<div style="font-size:11px;font-weight:700;margin-top:4px;">Paulo Sergio Motta</div><div style="font-size:10px;color:#666;">Maestro</div></div>
          <div style="text-align:center;flex:1;">${luciaSig?`<img src="${luciaSig}" style="height:60px;object-fit:contain;display:block;margin:0 auto 4px;"/>`:"<div style='height:60px;border-bottom:1px solid #333;'></div>"}<div style="font-size:11px;font-weight:700;margin-top:4px;">Lucia Kratz</div><div style="font-size:10px;color:#666;">Produtora</div></div>
        </div>
        <div style="margin-top:40px;padding-top:14px;border-top:1px solid #eee;text-align:center;font-size:10px;color:#aaa;">Ônix Brasil Vocal Internacional · Goiânia, GO · Documento gerado em ${fmtDate(today)}</div>
      </div>
    </div>`;
    generatePDF(html, `Relatorio_Onix_${mesInicio}`);
  }

  return (
    <div>
      <div style={{background:C.roxo,borderRadius:8,padding:"18px 20px",marginBottom:20,color:"#fff",textAlign:"center"}}>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700}}>Ônix Brasil Vocal Internacional</div>
        <div style={{fontSize:10,marginTop:4,opacity:0.8,textTransform:"uppercase",letterSpacing:2}}>Relatório de Atividades</div>
      </div>

      <div style={FORM}>
        <div style={{fontSize:11,fontWeight:700,color:C.textoSub,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Configurar Relatório</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{marginBottom:12}}><label style={LS}>Mês início</label><input type="month" value={mesInicio} onChange={e=>setMesInicio(e.target.value)} style={IS}/></div>
          <div style={{marginBottom:12}}><label style={LS}>Mês fim</label><input type="month" value={mesFim} onChange={e=>setMesFim(e.target.value)} style={IS}/></div>
        </div>
        <div style={{marginBottom:12}}><label style={LS}>Texto de Apresentação</label><textarea value={textoIntro} onChange={e=>setTextoIntro(e.target.value)} placeholder="Descreva as atividades do período..." style={{...IS,height:80,resize:"vertical"}}/></div>
        <Inp label="Link do Vídeo" value={linkVideo} onChange={setLinkVideo} placeholder="https://youtube.com/..."/>
        <Inp label="Link das Fotos" value={linkFotos} onChange={setLinkFotos} placeholder="https://drive.google.com/..."/>
        <button onClick={gerarRelatorio} style={BTN_P}>⬇ Gerar Relatório PDF</button>

          {label:"Repertório",value:songs.length,color:C.laranja},
          {label:"Ensaios",value:ensaios.length,color:"#1565C0"},
          {label:"Apresentações",value:apresentacoes.length,color:"#1B5E20"},

          <div style={{fontSize:10,color:C.textoSub,marginTop:3,textTransform:"uppercase",letterSpacing:0.8}}>Receitas</div>
        </div>
        <div style={{background:C.branco,borderRadius:8,border:"1px solid #ffcdd2",padding:"14px",textAlign:"center"}}>
          <div style={{fontSize:22,fontWeight:700,color:"#B41020",fontFamily:"'Playfair Display',serif"}}>{fmtMoeda(totalDespesas)}</div>
          <div style={{fontSize:10,color:C.textoSub,marginTop:3,textTransform:"uppercase",letterSpacing:0.8}}>Despesas</div>
        </div>
      </div>

      <div style={{...CARD,marginBottom:12}}>
        <div style={{fontSize:11,fontWeight:700,color:C.textoSub,textTransform:"uppercase",letterSpacing:1,marginBottom:14}}>Coristas por Naipe</div>
        {byVoice.map(v=>(
          <div key={v.voice} style={{marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
              <span style={{fontWeight:700,color:VOICE_COLORS[v.voice]}}>{VOICE_LABELS[v.voice]}</span>
              <span style={{color:C.textoLeve}}>{v.count}</span>
            </div>
            <div style={{background:C.fundo,borderRadius:2,height:6}}>
              <div style={{width:`${v.count>0?(v.count/maxVoice)*100:0}%`,background:VOICE_COLORS[v.voice],height:"100%",borderRadius:2}}/>
            </div>
          </div>
        ))}
      </div>

      {bdays.length>0&&(
        <div style={{...CARD,borderLeft:`3px solid ${C.laranja}`,marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:C.laranja,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Aniversariantes do Mês</div>
          {bdays.map(b=>(
            <div key={b.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:`1px solid ${C.borda}`}}>
              <span style={{color:C.texto}}>{b.name}</span>
              <span style={{color:C.laranja,fontWeight:700}}>{fmtBday(b.birthday)}</span>
            </div>
          ))}
        </div>
      )}

      {inactive.length>0&&(
        <div style={CARD}>
          <div style={{fontSize:11,fontWeight:700,color:C.textoLeve,textTransform:"uppercase",letterSpacing:1,marginBottom:10}}>Histórico — Inativos ({inactive.length})</div>
          {inactive.map(m=><div key={m.id} style={{fontSize:12,color:C.textoLeve,padding:"3px 0"}}>{m.name} · {VOICE_LABELS[m.voice]}</div>)}
        </div>
      )}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────
function LoginScreen({members,onLogin}) {
  const [query,setQuery]=useState("");
  const [suggestions,setSuggestions]=useState([]);
  const [adminMode,setAdminMode]=useState(false);
  const [adminPwd,setAdminPwd]=useState("");
  const [error,setError]=useState("");

  useEffect(()=>{const s=localStorage.getItem("onix_user");if(s){try{onLogin(JSON.parse(s));}catch{}}},[ ]);
  function handleQuery(v){setQuery(v);setSuggestions(v.length>=3?members.filter(m=>m.name.toLowerCase().includes(v.toLowerCase())).slice(0,6):[]);}
  function selectUser(m){const u={...m,isAdmin:false};localStorage.setItem("onix_user",JSON.stringify(u));onLogin(u);}
  function loginAdmin(){if(adminPwd===ADMIN_PASSWORD){const u={id:0,name:"Administrador",isAdmin:true};localStorage.setItem("onix_user",JSON.stringify(u));onLogin(u);}else setError("Senha incorreta.");}

  return (
    <div style={{minHeight:"100vh",background:C.roxo,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet"/>
      <div style={{marginBottom:32,textAlign:"center"}}>
        <img src={ONIX_LOGO} style={{height:110,width:110,borderRadius:12,objectFit:"contain",display:"block",margin:"0 auto 16px",background:"transparent"}} alt="Logo Ônix"/>
        <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:30,fontWeight:700,letterSpacing:1}}>Ônix Brasil</div>
        <div style={{fontFamily:"'Playfair Display',serif",color:C.laranja,fontSize:16,marginTop:4,letterSpacing:2}}>Vocal Internacional</div>
        <div style={{width:48,height:2,background:C.laranja,margin:"12px auto 8px"}}/>
        <div style={{color:"rgba(255,255,255,0.5)",fontSize:11,textTransform:"uppercase",letterSpacing:2}}>Goiânia, GO</div>
      </div>
      <div style={{background:C.branco,borderRadius:8,padding:28,width:"100%",maxWidth:360,boxShadow:"0 8px 40px rgba(0,0,0,0.35)"}}>
        {!adminMode?(
          <>
            <div style={{fontSize:12,fontWeight:700,color:C.texto,marginBottom:18,textAlign:"center",textTransform:"uppercase",letterSpacing:0.8}}>Acesse com seu nome</div>
            <Inp label="Nome" placeholder="Digite pelo menos 3 letras..." value={query} onChange={handleQuery}/>
            {suggestions.length>0&&<div style={{border:`1px solid ${C.borda}`,borderRadius:6,overflow:"hidden",marginTop:-8,marginBottom:12}}>{suggestions.map(m=><div key={m.id} onClick={()=>selectUser(m)} style={{padding:"10px 14px",cursor:"pointer",borderBottom:`1px solid ${C.borda}`,display:"flex",justifyContent:"space-between",alignItems:"center",background:C.branco}}><div><span style={{fontSize:13,fontWeight:600,color:C.texto}}>{m.name}</span>{!m.active&&<span style={{fontSize:10,color:C.textoLeve,marginLeft:6}}>(inativo)</span>}</div><span style={{fontSize:9,color:VOICE_COLORS[m.voice],fontWeight:700,textTransform:"uppercase"}}>{VOICE_LABELS[m.voice]}</span></div>)}</div>}
            {query.length>=3&&suggestions.length===0&&<div style={{color:C.roxo,fontSize:12,textAlign:"center",marginBottom:12,fontStyle:"italic"}}>Nome não encontrado. Fale com a administração.</div>}
            <button onClick={()=>setAdminMode(true)} style={{background:"none",border:"none",color:C.textoLeve,fontSize:11,cursor:"pointer",width:"100%",textAlign:"center",marginTop:10,fontFamily:"inherit",textTransform:"uppercase",letterSpacing:0.8}}>Acesso administrativo</button>
          </>
        ):(
          <>
            <div style={{fontSize:12,fontWeight:700,color:C.texto,marginBottom:18,textAlign:"center",textTransform:"uppercase",letterSpacing:0.8}}>Administração</div>
            <Inp label="Senha" type="password" value={adminPwd} onChange={v=>{setAdminPwd(v);setError("");}}/>
            {error&&<div style={{color:"#B41020",fontSize:12,marginBottom:10,textAlign:"center"}}>{error}</div>}
            <button onClick={loginAdmin} style={BTN_P}>Entrar</button>
            <button onClick={()=>{setAdminMode(false);setAdminPwd("");setError("");}} style={{background:"none",border:"none",color:C.textoLeve,fontSize:11,cursor:"pointer",width:"100%",textAlign:"center",marginTop:10,fontFamily:"inherit"}}>← Voltar</button>
          </>
        )}
      </div>
    </div>
  );
}

// ── APP PRINCIPAL ─────────────────────────────────────────────
function OnixBrasil() {
  const [user,setUser]=useState(null);
  const [activeTab,setActiveTab]=useState(0);
  const [members,setMembers]=useState(()=>gs("onix_members",INIT_MEMBERS));
  const [events,setEvents]=useState(()=>gs("onix_events",INIT_EVENTS));
  const [songs,setSongs]=useState(()=>gs("onix_songs",INIT_SONGS));
  const [notices,setNotices]=useState(()=>gs("onix_notices",INIT_NOTICES));
  const [materials,setMaterials]=useState(()=>gs("onix_materials",INIT_MATERIALS));
  const [financeiro,setFinanceiro]=useState(()=>gs("onix_financeiro",INIT_FINANCEIRO));

  useEffect(()=>ss("onix_members",members),[members]);
  useEffect(()=>ss("onix_events",events),[events]);
  useEffect(()=>ss("onix_songs",songs),[songs]);
  useEffect(()=>ss("onix_notices",notices),[notices]);
  useEffect(()=>ss("onix_materials",materials),[materials]);
  useEffect(()=>ss("onix_financeiro",financeiro),[financeiro]);

  if(!user) return <LoginScreen members={members} onLogin={setUser}/>;

  const isAdmin=user.isAdmin;
  const currentMember=!isAdmin?members.find(m=>m.id===user.id):null;

  const tabs=[
    {label:"Agenda",icon:"📅"},
    {label:"Kits",icon:"🎵"},
    {label:"Estudos",icon:"📚"},
    {label:"Declaração",icon:"📋"},
    ...(isAdmin?[{label:"Financeiro",icon:"💰"},{label:"Relatório",icon:"📊"},{label:"Cadastro",icon:"👥"}]:[]),
  ];

  return (
    <div style={{minHeight:"100vh",background:C.fundo,fontFamily:"'Lato',sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet"/>
      <div style={{background:C.roxo,padding:"14px 20px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 8px rgba(74,0,128,0.3)"}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
          <img src={ONIX_LOGO} style={{height:36,width:36,borderRadius:4,objectFit:"cover"}} alt="Logo Ônix"/>
          <div style={{fontFamily:"'Playfair Display',serif",color:"#fff",fontSize:17,fontWeight:700,letterSpacing:0.5}}>Ônix Brasil <span style={{color:C.laranja,fontSize:13}}>Vocal Internacional</span></div>
        </div>
          <div style={{color:"rgba(255,255,255,0.6)",fontSize:10,textTransform:"uppercase",letterSpacing:1,marginTop:1}}>Olá, {user.name.split(" ")[0]}{isAdmin?" · Admin":""}</div>
        </div>
        <button onClick={()=>{localStorage.removeItem("onix_user");setUser(null);setActiveTab(0);}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",borderRadius:4,padding:"5px 12px",fontSize:10,cursor:"pointer",fontFamily:"inherit",textTransform:"uppercase",letterSpacing:0.8}}>Sair</button>
      </div>

      <div style={{padding:"18px 16px 90px",maxWidth:600,margin:"0 auto"}}>
        <NoticeBar notices={notices} members={members}/>
        {activeTab===0&&<AgendaTab events={events} isAdmin={isAdmin} onSave={setEvents} currentUser={user} members={members}/>}
        {activeTab===1&&<KitsTab songs={songs} isAdmin={isAdmin} onSave={setSongs}/>}
        {activeTab===2&&<EstudosTab materials={materials} isAdmin={isAdmin} onSave={setMaterials}/>}
        {activeTab===3&&<DeclaracaoTab member={isAdmin?{id:0,name:"Lucia Kratz",voice:"soprano",startDate:"2026-01-01",endDate:""}:currentMember||member} isAdmin={isAdmin} members={members} events={events} pauloSig={PAULO_SIG} luciaSig={LUCIA_SIG}/>}
        {activeTab===4&&isAdmin&&<FinanceiroTab financeiro={financeiro} onSave={setFinanceiro} members={members}/>}
        {activeTab===5&&isAdmin&&<RelatorioTab members={members} events={events} songs={songs} materials={materials} financeiro={financeiro} pauloSig={PAULO_SIG} luciaSig={LUCIA_SIG}/>}
        {activeTab===6&&isAdmin&&<CadastroTab members={members} onSave={setMembers} notices={notices} onSaveNotices={setNotices}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.branco,borderTop:`1px solid ${C.borda}`,display:"flex",zIndex:100,boxShadow:"0 -2px 12px rgba(0,0,0,0.06)"}}>
        {tabs.map((tab,i)=>(
          <button key={i} onClick={()=>setActiveTab(i)} style={{flex:1,padding:"10px 0 8px",border:"none",background:"none",cursor:"pointer",color:activeTab===i?C.roxo:C.textoLeve,borderTop:`2px solid ${activeTab===i?C.roxo:"transparent"}`,fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:0.4,display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit"}}>
            <span style={{fontSize:18}}>{tab.icon}</span>{tab.label}
          </button>
        ))}
      </div>
    </div>
  );
}

    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OnixBrasil />);
  </script>
</body>
</html>
